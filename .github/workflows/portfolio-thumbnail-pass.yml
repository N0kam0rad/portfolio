name: Portfolio thumbnail pass

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create thumbnails and wire cards
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re, html

          assets = Path('assets')
          assets.mkdir(exist_ok=True)

          thumbs = {
            'aure-thumb.svg': ('Aurë / Accord', 'scent wardrobe · daily orbit', '#FF7A3D', ['Galaxy view', 'Wear log', 'Recommendation']),
            'roommate-tracker-thumb.svg': ('Roommate Tracker', 'shared rent dashboard', '#11B981', ['Paid', 'Owes', 'History']),
            'plate-planner-thumb.svg': ('My Plate Planner', 'protein-first meal planner', '#7C4DFF', ['Breakfast', 'Lunch', 'Dinner']),
            'helix7-thumb.svg': ('Helix7', 'voice notes to chapters', '#ED3A24', ['Voice memo', 'Outline', 'Draft']),
            'interior-render-thumb.svg': ('Interior Render Studio', 'room redesign preview', '#FF7A3D', ['Before', 'Style', 'Render']),
          }

          def svg(title, subtitle, color, labels):
              title = html.escape(title)
              subtitle = html.escape(subtitle)
              labels = [html.escape(x) for x in labels]
              return f'''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="{title} thumbnail">
            <rect width="1200" height="750" fill="#F4EEE2"/>
            <rect x="34" y="34" width="1132" height="682" rx="34" fill="#FFFDF8" stroke="#1A1613" stroke-width="8"/>
            <rect x="34" y="34" width="1132" height="116" rx="34" fill="{color}" stroke="#1A1613" stroke-width="8"/>
            <rect x="34" y="104" width="1132" height="46" fill="{color}"/>
            <circle cx="78" cy="92" r="14" fill="#ED3A24" stroke="#1A1613" stroke-width="5"/>
            <circle cx="122" cy="92" r="14" fill="#FFC835" stroke="#1A1613" stroke-width="5"/>
            <circle cx="166" cy="92" r="14" fill="#11B981" stroke="#1A1613" stroke-width="5"/>
            <text x="222" y="105" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#FFFFFF">{title}</text>
            <text x="222" y="198" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="4" fill="#6E665B" text-transform="uppercase">{subtitle}</text>
            <g transform="translate(92 250)">
              <rect x="0" y="0" width="286" height="340" rx="24" fill="#F1F1F5" stroke="#1A1613" stroke-width="5"/>
              <rect x="28" y="34" width="160" height="16" rx="8" fill="#1A1613" opacity=".18"/>
              <rect x="28" y="76" width="225" height="24" rx="12" fill="{color}" opacity=".9"/>
              <rect x="28" y="126" width="210" height="18" rx="9" fill="#1A1613" opacity=".12"/>
              <rect x="28" y="170" width="234" height="112" rx="18" fill="#FFFFFF" stroke="#1A1613" stroke-width="4"/>
              <path d="M54 252 C84 206, 128 220, 158 188 S224 178, 242 216" fill="none" stroke="{color}" stroke-width="12" stroke-linecap="round"/>
              <text x="28" y="320" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#1A1613">{labels[0]}</text>
            </g>
            <g transform="translate(458 250)">
              <rect x="0" y="0" width="286" height="340" rx="24" fill="#FFFFFF" stroke="#1A1613" stroke-width="5"/>
              <rect x="30" y="36" width="226" height="48" rx="18" fill="{color}" opacity=".18"/>
              <rect x="30" y="112" width="226" height="48" rx="18" fill="{color}" opacity=".32"/>
              <rect x="30" y="188" width="226" height="48" rx="18" fill="{color}" opacity=".48"/>
              <rect x="30" y="264" width="144" height="24" rx="12" fill="#1A1613" opacity=".15"/>
              <text x="30" y="320" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#1A1613">{labels[1]}</text>
            </g>
            <g transform="translate(824 250)">
              <rect x="0" y="0" width="286" height="340" rx="24" fill="#F7F2EA" stroke="#1A1613" stroke-width="5"/>
              <circle cx="143" cy="128" r="70" fill="{color}" opacity=".9" stroke="#1A1613" stroke-width="5"/>
              <circle cx="112" cy="114" r="10" fill="#FFFDF8"/>
              <circle cx="174" cy="114" r="10" fill="#FFFDF8"/>
              <path d="M105 170 Q143 202 181 170" fill="none" stroke="#1A1613" stroke-width="7" stroke-linecap="round"/>
              <rect x="58" y="236" width="170" height="26" rx="13" fill="#1A1613" opacity=".16"/>
              <text x="58" y="320" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#1A1613">{labels[2]}</text>
            </g>
            <text x="92" y="670" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#6E665B">Portfolio thumbnail · public-safe demo visual</text>
          </svg>'''

          for name, args in thumbs.items():
              (assets / name).write_text(svg(*args))

          replacements = {
            '<div class="thumb ph"><span class="big">AURÉ</span><span class="peek">Fragrance brain</span></div>': '<div class="thumb"><img src="assets/aure-thumb.svg" alt="Aurë and Accord fragrance wardrobe app thumbnail" loading="lazy" /></div>',
            '<div class="thumb ph"><span class="big">FACE<br/>ANALYSIS</span><span class="peek">Clickable demo</span></div>': '<div class="thumb"><img src="assets/aesthetic-sim-thumb.jpg" alt="AestheticSim consultation board — facial mapping, aging analysis, and downloadable treatment plan" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;"/></div>',
            '<div class="thumb ph"><span class="big">SPLIT</span><span class="peek">Mobile app</span></div>': '<div class="thumb"><img src="assets/roommate-tracker-thumb.svg" alt="Roommate Tracker shared rent dashboard thumbnail with dummy data" loading="lazy" /></div>',
            '<div class="thumb ph"><span class="big">EAT</span><span class="peek">Mobile app</span></div>': '<div class="thumb"><img src="assets/plate-planner-thumb.svg" alt="My Plate Planner meal planning dashboard thumbnail with dummy data" loading="lazy" /></div>',
            '<div class="thumb ph"><span class="big">A NOVEL</span><span class="peek">From voice notes</span></div>': '<div class="thumb"><img src="assets/helix7-thumb.svg" alt="Helix7 voice notes to chapter workflow thumbnail" loading="lazy" /></div>',
            '<div class="thumb ph"><span class="big">INTERIORS</span><span class="peek">AI render</span></div>': '<div class="thumb"><img src="assets/interior-render-thumb.svg" alt="Interior Render Studio room redesign preview thumbnail" loading="lazy" /></div>',
          }

          def patch_file(path, preferred):
              p = Path(path)
              s = p.read_text()
              for old, new in replacements.items():
                  s = s.replace(old, new)
              blocks = re.findall(r'\n\s*<article class="proj[\s\S]*?</article>', s)
              if blocks:
                  def title(block):
                      m = re.search(r'<h3>(.*?)</h3>', block)
                      return re.sub(r'<.*?>', '', m.group(1)).strip() if m else ''
                  by_title = {title(b): b for b in blocks}
                  ordered = [by_title[t] for t in preferred if t in by_title]
                  ordered += [b for b in blocks if b not in ordered]
                  start = s.find(blocks[0])
                  end = s.find(blocks[-1], start) + len(blocks[-1])
                  s = s[:start] + ''.join(ordered) + s[end:]
              p.write_text(s)

          patch_file('index.html', ['BonnetNoona', 'AestheticSim', 'Aurë / Accord'])
          patch_file('portfolio.html', ['BonnetNoona', 'AestheticSim', 'The Helix Class', 'Aurë / Accord', 'Roommate Tracker', 'My Plate Planner', 'Helix7', 'Interior Render Studio'])

          blockers = [
              ''.join(map(chr, [97,117,114,101,108,105,97])),
              ''.join(map(chr, [100,114,97,121,108,97])),
              ' '.join(['katie','kat']),
          ]
          hits = []
          for f in Path('.').rglob('*'):
              if f.is_file() and f.suffix.lower() in {'.html','.css','.js','.txt','.md','.svg','.yml'} and '.git' not in f.parts:
                  txt = f.read_text(errors='ignore').lower()
                  for b in blockers:
                      if b in txt:
                          hits.append((str(f), b))
          if hits:
              raise SystemExit('Privacy blocker found: ' + repr(hits[:10]))

          Path('.github/workflows/portfolio-thumbnail-pass.yml').unlink(missing_ok=True)
          Path('wiki/_thumbnail-pass-trigger.md').unlink(missing_ok=True)
          PY
      - name: Commit thumbnail pass
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html portfolio.html assets/*.svg .github/workflows/portfolio-thumbnail-pass.yml wiki/_thumbnail-pass-trigger.md
          git commit -m "Add thumbnails and prioritize visual project cards"
          git push
