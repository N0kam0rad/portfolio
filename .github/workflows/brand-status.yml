name: Brand status labels
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/apply_branded_statuses.py
      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add index.html portfolio.html
          git diff --cached --quiet || git commit -m "Apply branded status labels"
          git push
