name: Fix portfolio AestheticSim thumb

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch portfolio card
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('portfolio.html')
          s = p.read_text()
          old = '<div class="thumb ph"><span class="big">FACE<br/>ANALYSIS</span><span class="peek">Clickable demo</span></div>'
          new = '<div class="thumb"><img src="assets/aesthetic-sim-thumb.jpg" alt="AestheticSim consultation board — facial mapping, aging analysis, and downloadable treatment plan" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;"/></div>'
          if old not in s and new not in s:
              raise SystemExit('AestheticSim placeholder block not found')
          if old in s:
              s = s.replace(old, new, 1)
              p.write_text(s)
          blockers = [
              ''.join(map(chr, [97,117,114,101,108,105,97])),
              ''.join(map(chr, [100,114,97,121,108,97])),
              ' '.join(['katie','kat']),
          ]
          hits = []
          for f in Path('.').rglob('*'):
              if f.is_file() and f.suffix.lower() in {'.html','.css','.js','.txt','.md'} and '.git' not in f.parts:
                  txt = f.read_text(errors='ignore').lower()
                  for b in blockers:
                      if b in txt:
                          hits.append((str(f), b))
          if hits:
              raise SystemExit('Privacy blocker found: ' + repr(hits[:10]))
          Path('.github/workflows/fix-portfolio-thumb.yml').unlink(missing_ok=True)
          PY
      - name: Commit fix
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add portfolio.html .github/workflows/fix-portfolio-thumb.yml
          git commit -m "Wire AestheticSim thumbnail on portfolio page"
          git push
