function Icon({ name, size=18, className='', strokeWidth=2, ...rest }) {
  const node = window.lucide?.icons?.[name] || null;
  return React.createElement('svg',{
    xmlns:'http://www.w3.org/2000/svg', width:size, height:size,
    viewBox:'0 0 24 24', fill:'none', stroke:'currentColor',
    strokeWidth, strokeLinecap:'round', strokeLinejoin:'round', className, ...rest,
  }, node ? node.map(([tag,attrs],i)=>React.createElement(tag,{key:i,...attrs})) : null);
}

// ─── Shared UI ─────────────────────────────────────────────────────────────────
const Badge = ({children, color='zinc'}) => {
  const colors = { violet:'bg-violet-50 text-violet-700 border-violet-200', green:'bg-green-50 text-green-700 border-green-200', blue:'bg-blue-50 text-blue-700 border-blue-200', red:'bg-red-50 text-red-700 border-red-200', zinc:'bg-zinc-100 text-zinc-600 border-zinc-200', sage:'bg-sage-50 text-sage-700 border-sage-200' };
  return <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full border text-[10px] font-bold uppercase tracking-wider ${colors[color]||colors.zinc}`}>{children}</span>;
};

const ROIBar = ({score}) => (
  <div className="flex items-center gap-2">
    <div className="flex gap-0.5">{Array.from({length:10}).map((_,i)=><div key={i} className={`w-2 h-2 rounded-sm ${i<score?'bg-violet-500':'bg-zinc-200'}`}/>)}</div>
    <span className="text-[10px] font-bold text-violet-700">{score}/10 ROI</span>
  </div>
);

const ImageSlider = ({ src }) => {
  const [pos, setPos] = useState(50);
  const ref = useRef(null);
  const move = (x) => {
    if (!ref.current) return;
    const r = ref.current.getBoundingClientRect();
    setPos(Math.max(5, Math.min(95, ((x-r.left)/r.width)*100)));
  };
  return (
    <div ref={ref} className="relative w-full aspect-[3/4] bg-zinc-100 rounded-2xl overflow-hidden cursor-ew-resize select-none border border-zinc-200"
      onMouseMove={e=>move(e.clientX)} onTouchMove={e=>move(e.touches[0].clientX)}>
      <img src={src} className="absolute inset-0 w-full h-full object-cover" style={{filter:'contrast(1.04) brightness(1.03) saturate(0.9)'}} draggable="false" alt="Simulated"/>
      <div className="absolute bottom-3 right-3"><Badge color="sage">Simulated</Badge></div>
      <div className="absolute inset-0 border-r-2 border-white" style={{clipPath:`polygon(0 0,${pos}% 0,${pos}% 100%,0 100%)`}}>
        <img src={src} className="w-full h-full object-cover" draggable="false" alt="Current"/>
        <div className="absolute bottom-3 left-3"><Badge color="zinc">Current</Badge></div>
      </div>
      <div className="absolute top-0 bottom-0 flex items-center justify-center" style={{left:`calc(${pos}% - 22px)`}}>
        <div className="w-11 h-11 bg-white rounded-full shadow-xl flex items-center justify-center border border-zinc-200">
          <Icon name="ChevronsLeftRight" size={16} className="text-zinc-600"/>
        </div>
      </div>
    </div>
  );
};

  const STEPS = 5;

  const Step0 = () => (
    <div className="fade-up">
      <p className="text-xs font-bold uppercase tracking-[0.2em] text-violet-700 mb-2">Aesthetic Journey Studio</p>

      <p className="text-zinc-500 mb-8 leading-relaxed">This short intake takes about 5 minutes and helps your provider build a personalized treatment and skincare plan before you arrive. Nothing is a commitment — just a starting point.</p>
      <p className="text-sm font-medium text-zinc-700 mb-4">What brings you in today? <span className="text-zinc-400 font-normal">(select all that apply)</span></p>
      <div className="flex flex-wrap gap-2 mb-8">
        {GOALS.map(g=>(
          <button key={g} onClick={()=>setData(p=>({...p, goals: p.goals.includes(g)?p.goals.filter(x=>x!==g):[...p.goals.filter(x=>x!=='Not sure yet'),g]}))}

        <button onClick={()=>setData(p=>({...p, goals: p.goals.includes('Not sure yet')?[]:['Not sure yet']}))}
          className={`px-4 py-2 rounded-full border border-dashed text-sm font-medium transition-all ${data.goals.includes('Not sure yet')?'bg-zinc-900 text-white border-zinc-900':'border-zinc-300 text-zinc-500 hover:border-zinc-500'}`}>Not sure yet — just exploring</button>
      </div>
      <button disabled={!data.goals.length} onClick={()=>setStep(1)}
        className="px-8 py-3.5 bg-zinc-900 text-white font-medium rounded-xl hover:bg-zinc-800 transition disabled:opacity-30 disabled:cursor-not-allowed">
        Continue <span className="ml-1 opacity-60">→</span>
      </button>
    </div>
  );

  const Step1 = () => (
    <div className="fade-up">
      <h2 className="text-2xl font-serif font-semibold text-zinc-800 mb-2">Your aesthetic preference</h2>
      <p className="text-zinc-500 mb-6 text-sm">This helps your provider calibrate the plan to your comfort zone.</p>
      <div className="space-y-3 mb-8">
        {[['Very subtle','I want to look like myself, just more rested'],['Natural but noticeable','I want people to notice something changed, not what'],['Balanced optimization','Open to the full picture — provider guides the plan'],['Dramatic change','I want significant improvement — provider will discuss expectations'],['Not sure',"I don't know yet — I'd like my provider to guide me"]].map(([label,desc])=>(
          <button key={label} onClick={()=>set('aesthetic',label)}
            className={`w-full text-left p-4 rounded-2xl border-2 transition-all ${data.aesthetic===label?'border-zinc-900 bg-zinc-50':'border-zinc-200 hover:border-zinc-300'}`}>
            <p className={`font-semibold text-sm mb-0.5 ${data.aesthetic===label?'text-zinc-900':'text-zinc-700'}`}>{label}</p>
            <p className="text-xs text-zinc-500">{desc}</p>
          </button>
        ))}
      </div>
      <p className="text-sm font-medium text-zinc-700 mb-3">Treatments you're curious about: <span className="text-zinc-400 font-normal">(optional)</span></p>
      <div className="flex flex-wrap gap-2 mb-8">

      <div className="flex gap-3">
        <button onClick={()=>setStep(1)} className="px-6 py-3 border border-zinc-200 text-zinc-600 rounded-xl hover:bg-zinc-50 transition text-sm">Back</button>
        <button onClick={()=>setStep(3)} className="px-8 py-3 bg-zinc-900 text-white font-medium rounded-xl hover:bg-zinc-800 transition text-sm">Continue →</button>

      </div>
    </div>
  );

  const PHOTO_SLOTS = ['Front — Neutral','Front — Smiling','Left Profile','Right Profile'];
  const Step4 = () => {
    const [previews, setPreviews]   = useState({});
    const [uploading, setUploading] = useState(false);
    const [uploadIdx, setUploadIdx] = useState(-1);
    const [done, setDone]           = useState(false);
    const inputRefs = PHOTO_SLOTS.map(() => React.useRef());

    const onFileChange = (i, e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => setPreviews(p => ({ ...p, [i]: ev.target.result }));
      reader.readAsDataURL(file);
    };

    const handleUpload = () => {
      if (!Object.keys(previews).length) return;
      setUploading(true);
      // Animate each filled slot sequentially then complete
      let idx = 0;
      const filled = Object.keys(previews).map(Number);
      const tick = () => {
        if (idx >= filled.length) { setTimeout(() => { setUploading(false); setDone(true); }, 400); return; }
        setUploadIdx(filled[idx]);
        idx++;
        setTimeout(tick, 600);
      };
      setTimeout(tick, 300);
    };

    const hasAny = Object.keys(previews).length > 0;

    return (
      <div className="fade-up">
        <h2 className="text-2xl font-serif font-semibold text-zinc-800 mb-2">Photo upload</h2>
        <p className="text-zinc-500 mb-2 text-sm leading-relaxed">Upload 4 views so your provider can prepare before you arrive. Good lighting, hair pulled back, neutral expression. <strong className="text-zinc-700">No filters.</strong></p>
        <div className="mb-4 p-3 bg-zinc-50 rounded-xl border border-zinc-200 text-xs text-zinc-500 flex items-start gap-2">
          <Icon name="Lock" size={13} className="shrink-0 mt-0.5 text-zinc-400"/>
          Photos are stored securely and only visible to your care team. You consent to their use for this consultation only.
        </div>
        {!done ? (
          <>
            <div className="grid grid-cols-2 gap-3 mb-6">
              {PHOTO_SLOTS.map((v,i) => (
                <div key={v} className="relative">
                  <input
                    ref={inputRefs[i]}
                    type="file"
                    accept="image/*"
                    className="hidden"
                    onChange={e => onFileChange(i, e)}
                  />
                  <div
                    onClick={() => !uploading && inputRefs[i].current?.click()}
                    className={`aspect-[3/4] rounded-2xl border-2 border-dashed flex flex-col items-center justify-center text-center cursor-pointer transition-all overflow-hidden relative
                      ${previews[i] ? 'border-violet-400 bg-violet-50' : 'border-zinc-200 hover:border-violet-300 hover:bg-zinc-50'}
                      ${uploading ? 'pointer-events-none' : ''}`}
                  >
                    {previews[i] ? (
                      <>
                        <img src={previews[i]} className="absolute inset-0 w-full h-full object-cover rounded-2xl" alt={v}/>
                        {uploading && uploadIdx === i && (
                          <div className="absolute inset-0 bg-violet-600/60 flex items-center justify-center rounded-2xl">
                            <Icon name="Loader" size={24} className="text-white animate-spin"/>
                          </div>
                        )}
                        {(!uploading || uploadIdx !== i) && (
                          <div className="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/50 to-transparent p-2 rounded-b-2xl">
                            <span className="text-[10px] font-semibold text-white uppercase tracking-wide">{v}</span>
                          </div>
                        )}
                        {!uploading && (
                          <div className="absolute top-2 right-2 w-5 h-5 bg-violet-500 rounded-full flex items-center justify-center">
                            <Icon name="Check" size={11} className="text-white"/>
                          </div>
                        )}
                      </>
                    ) : (
                      <div className="p-4 flex flex-col items-center">
                        <Icon name="Camera" size={22} className="text-zinc-300 mb-2"/>
                        <span className="text-xs font-semibold text-zinc-500 uppercase tracking-wide">{v}</span>
                        <span className="text-[10px] text-zinc-400 mt-1">Tap to add</span>
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>
            {!hasAny && (
              <p className="text-center text-xs text-zinc-400 mb-4">Add at least one photo to continue.</p>
            )}
            <button
              onClick={handleUpload}
              disabled={uploading || !hasAny}
              className="w-full py-3.5 bg-zinc-900 text-white font-medium rounded-xl hover:bg-zinc-800 transition flex items-center justify-center gap-2 disabled:opacity-30"
            >
              {uploading
                ? <><Icon name="Loader" size={16} className="animate-spin"/><span>Uploading & checking quality…</span></>
                : <><Icon name="Upload" size={16}/><span>Upload {Object.keys(previews).length > 0 ? `${Object.keys(previews).length} photo${Object.keys(previews).length>1?'s':''}` : '& Submit'}</span></>
              }
            </button>
          </>
        ) : (
          <div className="text-center py-10 fade-up">
            <div className="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-green-100">
              <Icon name="CheckCircle2" size={32} className="text-green-500"/>
            </div>
            <h3 className="text-xl font-serif font-semibold text-zinc-800 mb-2">You're all set.</h3>
            <p className="text-zinc-500 text-sm mb-6">Your provider is reviewing your intake and will have a personalized plan ready before your appointment.</p>
            <button onClick={()=>onComplete(data)} className="px-8 py-3.5 bg-zinc-900 text-white font-medium rounded-xl hover:bg-zinc-800 transition">
              View my dashboard →
            </button>
          </div>
        )}
      </div>
    );
  };

  const stepComponents = [<Step0/>,<Step1/>,<Step2/>,<Step3/>,<Step4/>];

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6 font-sans">
      <div className="max-w-lg w-full">
        <StepDots total={STEPS} current={step}/>
        {stepComponents[step]}
      </div>
    </div>
  );
};

const PrintableBoard = ({ client, plan, db, settings, onClose }) => {
  const fmt = n => '$'+n.toLocaleString();
  const firstVisitLow = plan.items.filter(i=>i.enabled&&i.phase===1).reduce((s,i)=>s+(i.units*i.low),0);
  const firstVisitHigh = plan.items.filter(i=>i.enabled&&i.phase===1).reduce((s,i)=>s+(i.units*i.high),0);
  const allLow = plan.items.filter(i=>i.enabled).reduce((s,i)=>s+(i.units*i.low),0);
  const allHigh = plan.items.filter(i=>i.enabled).reduce((s,i)=>s+(i.units*i.high),0);
  const topItems = [...plan.items].filter(i=>i.enabled).sort((a,b)=>b.roi-a.roi).slice(0,5);
  const isGLP1 = client.intake?.glp1;
  const showSim = settings?.board?.showSimGallery !== false;
  const showCost = settings?.board?.showCostForecast !== false;
  const showPricing = settings?.board?.showPricing !== false;
  const watermark = settings?.board?.watermark !== false;
  const clinicName = settings?.branding?.clinicName || db.organization.name;
  const tagline = settings?.branding?.tagline || db.organization.tagline;
  const disclaimer = settings?.branding?.disclaimer || 'This board is an educational aesthetic planning tool and not a substitute for an in-person medical evaluation.';

  const DocHeader = ({page, total}) => (
    <div className="flex items-center justify-between pb-4 mb-6 border-b border-zinc-200">
      <div className="flex items-center gap-3">
        <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-zinc-800 to-zinc-950 flex items-center justify-center text-white font-serif text-base">
          {settings?.branding?.logoText||'LA'}

        <div>
          <p className="font-serif text-sm font-semibold text-zinc-800">{clinicName}</p>
          <p className="text-[10px] text-zinc-400 italic">{tagline}</p>
        </div>
      </div>
      <div className="text-center">
        <p className="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500">Luxury Facial Aesthetics</p>
        <p className="text-[10px] text-zinc-400">Consultation & Simulation Studio</p>

      <div className="text-right">
        <p className="text-xs font-bold text-zinc-400">PAGE {page} / {total}</p>

  );

  const SectionNum = ({n, title}) => (
    <div className="flex items-center gap-3 mb-4">
      <div className="w-7 h-7 rounded-full bg-zinc-900 text-white text-xs font-bold flex items-center justify-center shrink-0">{n}</div>
      <h2 className="text-xs font-bold uppercase tracking-[0.15em] text-zinc-700">{title}</h2>
    </div>
  );

  const packages = [
    { name:'A: Prevention Refresh', range:`${fmt(firstVisitLow)}–${fmt(firstVisitHigh)}`, desc:'Neuromodulator · Pigment-safe skincare · Optional light peel. Best first-step for expression lines and prevention.' },
    { name:'B: Natural Balancing', range:`${fmt(Math.round(allLow*0.6))}–${fmt(Math.round(allHigh*0.6))}`, desc:'Package A + PRF/EZ Gel for under-eyes + 1–2 syringes HA filler for cheek/chin/prejowl support.' },
    { name:'C: Collagen Architecture', range:`${fmt(allLow)}–${fmt(allHigh)}`, desc:'Sculptra series or Sofwave + PRF/EZ Gel + conservative neuromodulator. Best for prevention and firmness.' },
    { name:'D: Weight-Loss Aware Plan', range:`${fmt(Math.round(allLow*0.55))}–${fmt(Math.round(allHigh*0.85))} Year 1`, desc:'Botox + collagen/skin tightening now; major filler after weight stabilizes. Reassess every 10–15 lb change.' },
  ];

  const totalPages = 1 + (showSim?1:0) + (showCost?1:0);

  return (
    <div className="fixed inset-0 bg-white z-50 overflow-auto font-sans">
      {/* Toolbar */}
      <div className="no-print sticky top-0 z-10 bg-zinc-900 text-white px-6 py-3 flex items-center justify-between shadow-lg">
        <div className="flex items-center gap-3">
          <div className="w-7 h-7 bg-white/10 rounded-lg flex items-center justify-center"><Icon name="FileText" size={15}/></div>
          <div>
            <p className="text-sm font-medium">Consultation Board — {client.name}</p>
            <p className="text-xs text-zinc-400">{totalPages} pages · {clinicName}</p>
          </div>
        </div>
        <div className="flex items-center gap-3">
          <button onClick={()=>window.print()}

            <Icon name="Download" size={15}/> Download / Print PDF
          </button>
          <button onClick={onClose} className="px-3 py-2 border border-white/20 text-sm rounded-xl hover:bg-white/10 transition flex items-center gap-1.5">
            <Icon name="X" size={14}/> Close

        </div>

                <div>
                  <p className="font-bold text-zinc-700 mb-1">Approach</p>
                  <p className="text-zinc-600 text-xs leading-relaxed">

                    Budget range: {client.intake?.budget}. Downtime tolerance: {client.intake?.downtime||'1–2 days'}.

                </div>
                <div>
                  <p className="font-bold text-zinc-700 mb-1">Goals</p>
                  <div className="flex flex-wrap gap-1">
                    {(client.intake?.goals||[]).map(g=><span key={g} className="px-2 py-0.5 bg-zinc-100 text-zinc-700 text-[10px] rounded-full border border-zinc-200 font-medium">{g}</span>)}

                </div>
              </div>
            </div>

            {/* 3. Aging Analysis */}
            <div className="border border-zinc-200 rounded-2xl p-5">
              <SectionNum n="3" title="Aging Analysis"/>

                {[
                  { cat:'Dynamic Lines', val: plan.analysis.find(a=>a.region==='Upper Face')?.severity||2, note: plan.analysis.find(a=>a.region==='Upper Face')?.finding?.split('.')[0]||'Mild expression activity' },
                  { cat:'Static Lines', val:1, note:'Early fine lines, minimal at rest' },
                  { cat:'Volume Loss', val: plan.analysis.find(a=>a.region==='Midface'||a.region==='Under-eye')?.severity||2, note:'Mild under-eye and midface' },
                  { cat:'Contour Changes', val: plan.analysis.find(a=>a.region==='Lower Face'||a.region==='Jawline')?.severity||1, note:'Mild definition changes' },

                ].map(({cat,val,note})=>(
                  <div key={cat} className="flex items-center gap-3">
                    <div className="w-28 shrink-0">
                      <p className="text-[10px] font-bold text-zinc-600">{cat}</p>

            {/* 5. Facial Balancing */}

              <SectionNum n="5" title="Facial Balancing Opportunities"/>

              <div className="flex items-center gap-2"><Icon name="ClipboardList" size={15} className="text-zinc-400"/><span>Pre-consultation intake: not started</span></div>
            </div>
          </div>
          <button onClick={()=>setShowIntake(true)}
            className="w-full py-4 bg-zinc-900 text-white font-semibold rounded-2xl hover:bg-zinc-800 transition text-sm flex items-center justify-center gap-2 shadow-lg">
            <Icon name="ClipboardList" size={16}/> Start Pre-Consultation Intake →
          </button>
          <p className="text-xs text-zinc-400 mt-4">Your answers are private and only visible to your care team.</p>
        </div>
      </div>
    );
  }

  if ((client?.state==='booked'||client?.state==='invited') && showIntake) {
    return <IntakeWizard clientName={client.name} onComplete={intake=>{
      onUpdateDb(p=>({...p, clients:p.clients.map(c=>c.id===clientId?{...c,intake,state:'analyzing'}:c)}));
    }}/>;
  }

  const fmt = n=>'$'+n.toLocaleString();

  return (
  <React.Fragment>
    <div className="min-h-screen font-sans flex flex-col">
      <header className="bg-white/90 backdrop-blur border-b border-zinc-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
        <h1 className="font-serif text-lg text-zinc-800 font-semibold">{db.organization.name} <span className="text-zinc-400 font-sans font-normal text-sm ml-1">Client Portal</span></h1>
        <div className="flex items-center gap-4">
          <button onClick={()=>setView('dashboard')} className={`text-sm font-medium ${view==='dashboard'?'text-zinc-900':'text-zinc-500 hover:text-zinc-800'}`}>Dashboard</button>
          <button onClick={()=>setView('board')} disabled={!isApproved} className={`text-sm font-medium transition ${!isApproved?'text-zinc-300 cursor-not-allowed':view==='board'?'text-zinc-900':'text-zinc-500 hover:text-zinc-800'}`}>My Assessment</button>
          <button onClick={()=>setView('skincare')} disabled={!isApproved} className={`text-sm font-medium transition ${!isApproved?'text-zinc-300 cursor-not-allowed':view==='skincare'?'text-zinc-900':'text-zinc-500 hover:text-zinc-800'}`}>Skincare Plan</button>
          <div className="w-9 h-9 bg-zinc-100 rounded-full flex items-center justify-center"><Icon name="User" size={16} className="text-zinc-500"/></div>
        </div>
      </header>
      <main className="flex-grow max-w-4xl mx-auto w-full p-6">
        {view==='dashboard' && (
          <div className="space-y-6 fade-up">
            <h2 className="text-3xl font-serif font-semibold text-zinc-800 pt-2">Welcome, {client.name.split(' ')[0]}.</h2>
            {client.state==='analyzing' && (
              <div className="bg-white border border-zinc-200 rounded-3xl p-8 flex gap-5 shadow-sm">
                <div className="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center shrink-0"><Icon name="Activity" size={22} className="text-blue-500"/></div>
                <div>
                  <h3 className="font-semibold text-zinc-800 mb-1">Your intake is being reviewed</h3>
                  <p className="text-zinc-500 text-sm leading-relaxed">AI has analyzed your photos and goals. Dr. Aisha is customizing your personalized consultation board. You'll receive an email when it's ready.</p>
                  <div className="flex gap-2 mt-3 flex-wrap">
                    {(client.intake?.goals||[]).map(g=><Badge key={g} color="zinc">{g}</Badge>)}
                    {client.intake?.glp1&&<Badge color="sage">GLP-1 pathway</Badge>}
                  </div>
                </div>
              </div>
            )}
            {isApproved && (
              <div className="bg-gradient-to-br from-zinc-950 to-violet-950 rounded-3xl p-8 flex flex-col md:flex-row items-start md:items-center justify-between gap-6 shadow-xl text-white">
                <div className="flex gap-5">
                  <div className="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center shrink-0"><Icon name="CheckCircle2" size={24} className="text-green-400"/></div>
                  <div>
                    <h3 className="text-lg font-semibold mb-1">Your assessment is ready</h3>
                    <p className="text-zinc-400 text-sm">Dr. Aisha has completed your facial analysis, treatment plan, and skincare journey.</p>
                  </div>
                </div>
                <div className="flex gap-3 shrink-0 flex-wrap">
                  <button onClick={()=>setView('skincare')} className="px-5 py-2.5 bg-white/10 text-white text-sm font-medium rounded-xl hover:bg-white/20 transition">Skincare Plan</button>
                  <button onClick={()=>setView('board')} className="px-5 py-2.5 bg-white text-zinc-900 text-sm font-medium rounded-xl hover:bg-zinc-100 transition shadow-sm">View My Assessment →</button>
                  <button onClick={()=>setShowBoard(true)} className="px-5 py-2.5 bg-violet-600 text-white text-sm font-medium rounded-xl hover:bg-violet-700 transition flex items-center gap-2"><Icon name="Download" size={15}/> Download Board</button>
                </div>
              </div>
            )}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
              <div className="bg-white p-6 rounded-3xl border border-zinc-200 shadow-sm">
                <h4 className="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-5">Upcoming</h4>
                <div className="flex items-center gap-4">
                  <div className="w-14 h-14 bg-zinc-50 rounded-2xl border border-zinc-100 flex flex-col items-center justify-center shrink-0">
                    <span className="text-[10px] font-bold text-violet-700 uppercase">Jul</span>
                    <span className="text-xl font-serif font-semibold text-zinc-800">18</span>
                  </div>
                  <div>
                    <p className="font-medium text-zinc-800">Virtual Consultation</p>
                    <p className="text-sm text-zinc-500">2:00 PM · 30 min · Video Call</p>
                  </div>
                </div>
              </div>
              <div className="bg-white p-6 rounded-3xl border border-zinc-200 shadow-sm">
                <h4 className="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-4">Quick Actions</h4>
                <div className="space-y-2">
                  <button className="w-full flex items-center gap-2 text-sm text-zinc-700 hover:text-violet-700 py-1.5 transition font-medium"><Icon name="MessageSquare" size={16}/> Message my provider</button>
                  <button className="w-full flex items-center gap-2 text-sm text-zinc-700 hover:text-violet-700 py-1.5 transition font-medium"><Icon name="Camera" size={16}/> Upload progress photos</button>
                  <button className="w-full flex items-center gap-2 text-sm text-zinc-700 hover:text-violet-700 py-1.5 transition font-medium"><Icon name="CalendarPlus" size={16}/> Book appointment</button>
                </div>
              </div>
            </div>
          </div>
        )}
        {view==='board' && isApproved && plan && (
          <div className="fade-up">
            <ConsultationBoard client={client} plan={plan} db={db}/>
          </div>
        )}
        {view==='skincare' && isApproved && (
          <div className="space-y-8 pb-16 fade-up">
            <div>
              <h2 className="text-3xl font-serif font-semibold text-zinc-800 mb-1">Your Skincare Journey</h2>
              <p className="text-zinc-500">Prepared by Dr. Aisha · Updated every 4–6 weeks</p>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {[{label:'Morning Routine',steps:SKINCARE_AM,icon:'Sun',accent:'bg-violet-50 border-violet-100'},{label:'Evening Routine',steps:SKINCARE_PM,icon:'Moon',accent:'bg-sage-50 border-sage-100'}].map(({label,steps,icon,accent})=>(
                <div key={label} className={`p-6 rounded-3xl border ${accent}`}>
                  <div className="flex items-center gap-2 mb-5">
                    <Icon name={icon} size={18} className="text-zinc-600"/>
                    <h3 className="font-serif text-lg text-zinc-800 font-medium">{label}</h3>
                  </div>
                  <div className="space-y-4">
                    {steps.map((s,i)=>(
                      <div key={i} className="flex gap-3">
                        <span className="w-6 h-6 rounded-full bg-white border border-zinc-200 text-zinc-600 text-xs font-bold flex items-center justify-center shrink-0">{i+1}</span>
                        <div>
                          <p className="font-semibold text-zinc-800 text-sm">{s.step}</p>
                          <p className="text-xs text-zinc-600">{s.product}</p>
                          <p className="text-xs text-zinc-400 mt-0.5">{s.reason}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <div>
              <h3 className="text-sm font-bold text-zinc-700 mb-4">12-Week Skin Phase Plan</h3>
              <div className="relative">
                <div className="absolute top-5 left-5 right-5 h-0.5 bg-zinc-200 z-0"/>
                <div className="relative z-10 grid grid-cols-5 gap-3">
                  {SKINCARE_PHASES.map((p,i)=>(
                    <div key={i} className="text-center">
                      <div className="w-10 h-10 rounded-full bg-white border-2 border-zinc-900 flex items-center justify-center mx-auto mb-3 text-xs font-bold text-zinc-800">{i+1}</div>
                      <p className="text-[10px] font-bold uppercase tracking-wider text-violet-700 mb-1">{p.phase}</p>
                      <p className="text-xs font-semibold text-zinc-800 mb-1">{p.title}</p>
                      <p className="text-[11px] text-zinc-500 leading-relaxed">{p.desc}</p>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
    {showBoard && plan && (
      <PrintableBoard client={client} plan={plan} db={db} settings={settings} onClose={()=>setShowBoard(false)}/>
    )}
  </React.Fragment>
  );
};

// ─── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [db, setDb] = useState(MOCK_DB_INITIAL);
  const [settings, setSettings] = useState(ADMIN_SETTINGS_INITIAL);
  const [persona, setPersona] = useState(null);

  return (
    <React.Fragment>
      {!persona ? (
        <div className="min-h-screen flex items-center justify-center font-sans p-6">
          <div className="text-center max-w-md fade-up">
            <div className="w-20 h-20 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-xl bg-gradient-to-br from-zinc-800 to-zinc-950 ring-1 ring-white/10">
              <span className="text-white font-serif text-4xl">A</span>
            </div>
            <p className="text-xs font-bold uppercase tracking-[0.25em] text-violet-700 mb-3">{settings.branding.clinicName} · Aesthetic Intelligence Platform</p>
            <h1 className="text-5xl font-serif font-semibold text-zinc-800 mb-3">AestheticSim</h1>
            <p className="text-zinc-500 mb-2 text-lg leading-relaxed">Intake → Analysis → Simulation → Treatment Plan → Skincare Journey</p>
            <p className="text-zinc-400 text-sm mb-10">A full consultation operating system for modern medspas.</p>
            <div className="bg-white border border-zinc-200 rounded-3xl p-6 shadow-lg text-left space-y-3">
              <p className="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-4">Explore the prototype</p>
              <button onClick={()=>setPersona({role:'client',id:'c4'})} className="w-full py-3 bg-zinc-900 text-white rounded-xl text-sm font-medium flex items-center gap-3 px-4 hover:bg-zinc-800 transition">
                <Icon name="UserCheck" size={16}/>
                <div className="text-left"><div>New Client — Complete Intake</div><div className="text-white/50 text-xs">5-step intake wizard → AI analysis flow</div></div>
              </button>
              <div className="border-t border-zinc-100 pt-3">
                <p className="text-xs text-zinc-500 mb-2 font-medium">Provider / Clinician</p>
                <button onClick={()=>setPersona({role:'clinician'})} className="w-full py-3 border border-zinc-200 text-zinc-700 rounded-xl text-sm font-medium flex items-center gap-3 px-4 hover:bg-zinc-50 transition">
                  <Icon name="Stethoscope" size={16} className="text-zinc-500"/>
                  <div className="text-left"><div>Clinician Dashboard</div><div className="text-zinc-400 text-xs">Pipeline · Consultation Board · Edit Plans</div></div>
                </button>
              </div>
              <div className="border-t border-zinc-100 pt-3">
                <p className="text-xs text-zinc-500 mb-2 font-medium">Admin</p>
                <button onClick={()=>setPersona({role:'admin'})} className="w-full py-2.5 border border-zinc-200 text-zinc-600 rounded-xl text-sm font-medium flex items-center gap-3 px-4 hover:bg-zinc-50 transition mb-3">
                  <Icon name="Settings" size={16} className="text-zinc-400"/>
                  <div className="text-left"><div>Admin Settings</div><div className="text-zinc-400 text-xs">Branding · Integrations · Board</div></div>
                </button>
              </div>
              <div className="border-t border-zinc-100 pt-3">
                <p className="text-xs text-zinc-500 mb-2 font-medium">View as existing client</p>
                {db.clients.map(c=>{
                  const labels = { needs_review:'Board in review', approved:'Plan approved', analyzing:'AI analyzing', booked:'Appointment booked', invited:'Awaiting intake' };
                  return (
                    <button key={c.id} onClick={()=>setPersona({role:'client',id:c.id})}
                      className="w-full flex items-center justify-between text-sm px-3 py-2 hover:bg-zinc-50 rounded-xl group transition">
                      <div className="flex items-center gap-2">
                        <div className="w-7 h-7 rounded-full overflow-hidden bg-zinc-100 shrink-0">{c.photo&&<img src={c.photo} className="w-full h-full object-cover"/>}</div>
                        <span className="text-zinc-700 font-medium group-hover:text-zinc-900">{c.name}</span>
                      </div>
                      <Badge color={c.state==='approved'?'green':c.state==='needs_review'?'violet':c.state==='booked'?'blue':'zinc'}>{labels[c.state]||c.state}</Badge>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      ) : (
        <>
          {persona.role==='clinician' && <ClinicianApp db={db} onUpdateDb={setDb} settings={settings}/>}
          {persona.role==='client' && <ClientApp db={db} clientId={persona.id} onUpdateDb={setDb} settings={settings}/>}
          {persona.role==='admin' && <AdminPanel settings={settings} onSave={setSettings} onBack={()=>setPersona(null)}/>}
        </>
      )}
      <div className="fixed bottom-5 left-5 z-50 flex flex-col items-start gap-2">
        {persona && (
          <button onClick={()=>setPersona(null)} className="flex items-center gap-2 px-4 py-2 bg-white border border-zinc-200 rounded-full shadow-md text-xs font-bold text-zinc-700 hover:bg-zinc-50 transition">
            <Icon name="LayoutGrid" size={13}/> Switch role
          </button>
        )}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
