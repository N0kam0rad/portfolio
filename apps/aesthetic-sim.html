// --- Icon wrapper around lucide (replaces lucide-react) ---
function Icon({ name, size = 18, className = '', strokeWidth = 2, ...rest }) {
  const node = (window.lucide && window.lucide.icons && window.lucide.icons[name]) || null;
  const children = node
    ? node.map((child, i) => {
        const [tag, attrs] = child;
        return React.createElement(tag, { key: i, ...attrs });
      })
    : null;
  return React.createElement(
    'svg',
    {
      xmlns: 'http://www.w3.org/2000/svg',
      width: size, height: size, viewBox: '0 0 24 24',
      fill: 'none', stroke: 'currentColor',
      strokeWidth, strokeLinecap: 'round', strokeLinejoin: 'round',
      className, ...rest,
    },
    children
  );
}

const ImageSlider = ({ beforeSrc, afterSrc, cssFilter = 'contrast(1.03) brightness(1.02)' }) => {
  const [position, setPosition] = useState(50);
  const sliderRef = useRef(null);
  const handleMove = (clientX) => {
    if (!sliderRef.current) return;
    const rect = sliderRef.current.getBoundingClientRect();
    const x = Math.max(0, Math.min(clientX - rect.left, rect.width));
    setPosition((x / rect.width) * 100);
  };
  return (
    <div
      ref={sliderRef}
      className="relative w-full aspect-[3/4] bg-stone-100 rounded-2xl overflow-hidden cursor-ew-resize select-none border border-stone-200/80 shadow-inner"
      onMouseMove={(e) => handleMove(e.clientX)}
      onTouchMove={(e) => handleMove(e.touches[0].clientX)}
    >
      <div className="absolute inset-0 w-full h-full">
        <img src={afterSrc} alt="Simulated" className="w-full h-full object-cover" style={{ filter: cssFilter }} draggable="false" />
        <div className="absolute bottom-4 right-4 bg-white/90 backdrop-blur text-stone-800 text-[10px] uppercase font-bold tracking-widest px-3 py-1.5 rounded-full shadow-sm">Simulated</div>
      </div>
      <div className="absolute inset-0 w-full h-full border-r-[3px] border-white shadow-[2px_0_15px_rgba(0,0,0,0.2)]" style={{ clipPath: `polygon(0 0, ${position}% 0, ${position}% 100%, 0 100%)` }}>
        <img src={beforeSrc} alt="Current" className="w-full h-full object-cover" draggable="false" />
        <div className="absolute bottom-4 left-4 bg-stone-900/90 backdrop-blur text-white text-[10px] uppercase font-bold tracking-widest px-3 py-1.5 rounded-full shadow-sm">Current</div>
      </div>
      <div className="absolute top-0 bottom-0 w-[3px] bg-white shadow-[0_0_15px_rgba(0,0,0,0.4)] flex items-center justify-center" style={{ left: `calc(${position}% - 1.5px)` }}>

          <Icon name="Sliders" size={16} className="text-stone-700 rotate-90" />
        </div>
      </div>
    </div>
  );
};

  if (view === 'dashboard') {
    return (
      <div className="min-h-screen font-sans flex flex-col">
        <header className="bg-stone-900 px-6 py-4 flex items-center justify-between text-white">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 bg-white/10 rounded-lg flex items-center justify-center"><Icon name="Building" size={16}/></div>
            <h1 className="text-lg font-serif">{db.organization.name} <span className="text-stone-400 text-sm font-sans ml-2">Clinician Portal</span></h1>
          </div>
          <div className="flex items-center gap-6">
            <div className="flex items-center gap-2 text-sm text-stone-300"><Icon name="Activity" size={16}/> <span>{cols.review.length} Pending Reviews</span></div>
            <div className="w-8 h-8 bg-stone-700 rounded-full flex items-center justify-center"><Icon name="User" size={16}/></div>
          </div>
        </header>
        <main className="flex-grow p-8 max-w-7xl mx-auto w-full overflow-x-auto">
          <h2 className="text-2xl font-serif font-semibold text-stone-800 mb-8">Consultation Pipeline</h2>
          <div className="flex gap-6 min-w-[1000px] h-[calc(100vh-200px)]">
            <div className="w-1/3 flex flex-col gap-4">
              <h3 className="text-xs font-bold uppercase tracking-widest text-stone-400 flex items-center justify-between">
                <span>AI Processing</span> <span className="bg-stone-200 text-stone-600 px-2 py-0.5 rounded-full">{cols.new.length}</span>
              </h3>
              <div className="flex-grow bg-stone-100/70 rounded-2xl p-3 space-y-3 border border-stone-200 border-dashed">
                 {cols.new.map(cons => {
                   const c = db.clients.find(cl => cl.id === cons.client_id);
                   return (
                     <div key={cons.id} className="bg-white p-4 rounded-xl shadow-sm border border-stone-200 opacity-70">
                        <div className="flex items-center gap-3">
                           <div className="w-10 h-10 bg-stone-100 rounded-full overflow-hidden shrink-0">{c.photos[0] && <img src={c.photos[0].url} className="w-full h-full object-cover" alt="" />}</div>
                           <div>
                             <p className="font-medium text-stone-800 text-sm">{c.full_name}</p>
                             <p className="text-xs text-stone-400 flex items-center gap-1"><Icon name="Activity" size={12}/> Generating masks...</p>
                           </div>
                        </div>
                     </div>
                   )
                 })}
              </div>
            </div>
            <div className="w-1/3 flex flex-col gap-4">
              <h3 className="text-xs font-bold uppercase tracking-widest text-amber-700 flex items-center justify-between">
                <span>Needs Review</span> <span className="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full">{cols.review.length}</span>
              </h3>
              <div className="flex-grow bg-amber-50/40 rounded-2xl p-3 space-y-3 border border-amber-200">
                 {cols.review.map(cons => {
                   const c = db.clients.find(cl => cl.id === cons.client_id);
                   return (
                     <div key={cons.id} className="bg-white p-4 rounded-xl shadow-sm border border-amber-300/80 hover:shadow-md hover:-translate-y-0.5 transition-all cursor-pointer" onClick={() => handleOpenReview(cons.id)}>
                        <div className="flex items-start justify-between mb-3">
                          <div className="flex items-center gap-3">
                             <div className="w-10 h-10 bg-stone-100 rounded-full overflow-hidden shrink-0">{c.photos[0] && <img src={c.photos[0].url} className="w-full h-full object-cover" alt="" />}</div>
                             <div>
                               <p className="font-medium text-stone-800 text-sm">{c.full_name}</p>
                               <p className="text-xs text-amber-600 font-medium">Draft Ready</p>
                             </div>
                          </div>
                        </div>
                        <button className="w-full py-2 bg-stone-900 text-white text-xs font-medium rounded-lg hover:bg-stone-800 transition">Review & Edit</button>
                     </div>
                   )
                 })}
              </div>
            </div>
            <div className="w-1/3 flex flex-col gap-4">
              <h3 className="text-xs font-bold uppercase tracking-widest text-stone-400 flex items-center justify-between">
                <span>Plan Sent / Approved</span> <span className="bg-stone-200 text-stone-600 px-2 py-0.5 rounded-full">{cols.approved.length}</span>
              </h3>
              <div className="flex-grow bg-stone-50 rounded-2xl p-3 space-y-3 border border-stone-200">
                 {cols.approved.map(cons => {
                   const c = db.clients.find(cl => cl.id === cons.client_id);
                   return (
                     <div key={cons.id} className="bg-white p-4 rounded-xl shadow-sm border border-stone-200">
                        <div className="flex items-center gap-3">
                           <div className="w-10 h-10 bg-stone-100 rounded-full overflow-hidden shrink-0">{c.photos[0] && <img src={c.photos[0].url} className="w-full h-full object-cover" alt="" />}</div>
                           <div>
                             <p className="font-medium text-stone-800 text-sm">{c.full_name}</p>
                             <p className="text-xs text-stone-400 flex items-center gap-1"><Icon name="Check" size={12} className="text-green-500"/> Approved</p>
                           </div>
                        </div>
                     </div>
                   )
                 })}
              </div>
            </div>
          </div>
        </main>
      </div>
    );
  }

  if (view === 'review') {
    const consultation = db.consultations.find(c => c.id === selectedConsultationId);
    const client = db.clients.find(c => c.id === consultation.client_id);
    const sim = db.simulations.find(s => s.consultation_id === consultation.id);
    const originalPlan = db.treatment_plans.find(p => p.consultation_id === consultation.id);
    const [draftPlan, setDraftPlan] = useState(JSON.parse(JSON.stringify(originalPlan)));
    const handleItemToggle = (itemId) => setDraftPlan(prev => ({ ...prev, items: prev.items.map(i => i.id === itemId ? { ...i, enabled: !i.enabled } : i) }));
    const handleItemChange = (itemId, field, value) => setDraftPlan(prev => ({ ...prev, items: prev.items.map(i => i.id === itemId ? { ...i, [field]: value } : i) }));
    const handleApprove = () => {
      onUpdateDb(prev => {
        const next = { ...prev };
        next.consultations = next.consultations.map(c => c.id === consultation.id ? { ...c, state: 'approved' } : c);
        next.treatment_plans = next.treatment_plans.map(p => p.id === draftPlan.id ? { ...draftPlan, status: 'approved' } : p);
        return next;
      });
      setView('dashboard');
    };
    let low = 0, high = 0;
    draftPlan.items.filter(i => i.enabled).forEach(i => { low += (i.units * i.price_low); high += (i.units * i.price_high); });
    const totals = { low, high };
    return (
      <div className="min-h-screen font-sans flex flex-col h-screen overflow-hidden">
        <header className="bg-white/90 backdrop-blur border-b border-stone-200 px-4 py-3 flex items-center justify-between shrink-0">
          <div className="flex items-center gap-4">
             <button onClick={() => setView('dashboard')} className="p-2 hover:bg-stone-100 rounded-lg transition"><Icon name="ChevronLeft" size={20} className="text-stone-500"/></button>
             <div>
               <h1 className="text-lg font-serif font-semibold text-stone-800">Reviewing: {client.full_name}</h1>
               <p className="text-xs text-stone-500 flex items-center gap-1">AI Draft Generated • Validation Passed <Icon name="CheckCircle2" size={12} className="text-green-500"/></p>
             </div>
          </div>
          <div className="flex gap-3">
             <button className="px-4 py-2 bg-white border border-stone-300 text-stone-700 text-sm font-medium rounded-lg hover:bg-stone-50 transition">Save Draft</button>
             <button onClick={handleApprove} className="px-6 py-2 bg-stone-900 text-white text-sm font-medium rounded-lg hover:bg-stone-800 transition shadow-sm">Approve & Send to Client</button>
          </div>
        </header>
        <div className="flex flex-grow overflow-hidden">
           <div className="w-1/2 bg-stone-100/70 border-r border-stone-200 p-6 overflow-y-auto flex flex-col gap-6">
              <h3 className="text-xs font-bold uppercase tracking-widest text-stone-500">Clinical Evidence</h3>
              <div className="bg-white p-4 rounded-2xl border border-stone-200/70 shadow-sm">
                <div className="flex justify-between items-center mb-3">
                  <h4 className="font-serif text-stone-800">AI Simulation: {sim?.preset || 'Baseline'}</h4>
                  <div className="flex gap-2">
                     <span className="text-[10px] bg-green-50 text-green-700 px-2 py-1 rounded font-bold uppercase tracking-wider flex items-center gap-1"><Icon name="ShieldCheck" size={12}/> ID OK</span>
                     <span className="text-[10px] bg-blue-50 text-blue-700 px-2 py-1 rounded font-bold uppercase tracking-wider">Conf: {sim?.confidence * 100}%</span>
                  </div>
                </div>
                {sim && <ImageSlider beforeSrc={sim.before_url} afterSrc={sim.after_url} />}
              </div>
              <div className="bg-white p-4 rounded-2xl border border-stone-200/70 shadow-sm">
                <h4 className="font-serif text-stone-800 mb-3">Patient Photos (6/6)</h4>
                <div className="grid grid-cols-3 gap-2">
                   {[1,2,3,4,5,6].map(i => (
                     <div key={i} className="aspect-square bg-stone-100 rounded-lg border border-stone-200 overflow-hidden">
                        {i === 1 && client.photos[0] ? <img src={client.photos[0].url} className="w-full h-full object-cover"/> : <div className="w-full h-full flex items-center justify-center text-stone-300"><Icon name="Camera" size={20}/></div>}
                     </div>
                   ))}
                </div>
              </div>
           </div>
           <div className="w-1/2 bg-white p-8 overflow-y-auto">
              <div className="max-w-xl mx-auto space-y-10">
                 <div>
                    <h3 className="text-xs font-bold uppercase tracking-widest text-stone-400 border-b border-stone-100 pb-2 mb-4 flex justify-between">
                      <span>Facial Analysis</span> <span className="text-amber-600 flex items-center gap-1"><Icon name="Activity" size={12}/> AI Generated</span>
                    </h3>
                    <div className="space-y-4">
                       {draftPlan.analysis.map((an, idx) => (
                         <div key={an.id} className="group relative bg-stone-50 border border-stone-200 rounded-xl p-4 focus-within:ring-2 focus-within:ring-amber-500/20 focus-within:border-amber-300 transition">
                            <div className="flex justify-between items-center mb-1">
                               <label className="text-xs font-bold text-stone-700">{an.region}</label>
                               <button className="text-stone-300 hover:text-red-500 transition opacity-0 group-hover:opacity-100"><Icon name="Trash2" size={14}/></button>
                            </div>
                            <textarea className="w-full bg-transparent text-sm text-stone-600 border-none p-0 focus:ring-0 resize-none" rows={2} value={an.finding}
                               onChange={(e) => { const newAn = [...draftPlan.analysis]; newAn[idx].finding = e.target.value; setDraftPlan({...draftPlan, analysis: newAn}); }} />
                         </div>
                       ))}
                       <button className="text-sm font-medium text-amber-700 flex items-center gap-1 hover:underline"><Icon name="Plus" size={16}/> Add Region</button>
                    </div>
                 </div>
                 <div>
                    <h3 className="text-xs font-bold uppercase tracking-widest text-stone-400 border-b border-stone-100 pb-2 mb-4 flex justify-between">
                      <span>Treatment Plan</span> <span className="text-stone-400">Total: ${totals.low} - ${totals.high}</span>
                    </h3>
                    <div className="space-y-4">
                       {draftPlan.items.map((item) => {
                          const dbItem = db.pricing.find(p => p.label === item.treatment) || {};
                          return (
                           <div key={item.id} className={`border rounded-2xl overflow-hidden transition ${item.enabled ? 'border-amber-300 shadow-sm' : 'border-stone-200 opacity-60 bg-stone-50'}`}>
                              <div className="flex items-center justify-between p-4 bg-white border-b border-stone-100">
                                 <div className="flex items-center gap-3">
                                    <input type="checkbox" checked={item.enabled} onChange={() => handleItemToggle(item.id)} className="w-5 h-5 accent-amber-600 cursor-pointer" />
                                    <div>
                                      <p className="font-serif text-stone-800 font-medium">{item.treatment}</p>
                                      <p className="text-xs text-stone-500">${item.price_low}-${item.price_high} / {dbItem.unit_label || 'unit'}</p>
                                    </div>
                                 </div>
                                 <div className="flex items-center gap-2">
                                    <input type="number" className="w-16 p-1 text-sm border border-stone-300 rounded-lg text-center" value={item.units}
                                      onChange={(e) => handleItemChange(item.id, 'units', Number(e.target.value))} disabled={!item.enabled} />
                                    <span className="text-xs font-medium text-stone-500 uppercase">{dbItem.unit_label || 'u'}</span>
                                 </div>
                              </div>
                              {item.enabled && (
                                <div className="p-4 bg-stone-50">
                                   <label className="text-[10px] font-bold uppercase tracking-widest text-stone-400 mb-1 block">Clinical Rationale (Visible to Client)</label>
                                   <textarea className="w-full bg-white text-sm text-stone-700 border border-stone-200 rounded-lg p-2 focus:ring-amber-500 focus:border-amber-500 transition resize-none" rows={2} value={item.rationale}
                                      onChange={(e) => handleItemChange(item.id, 'rationale', e.target.value)} />
                                </div>
                              )}
                           </div>
                          )
                       })}
                       <button className="text-sm font-medium text-amber-700 flex items-center gap-1 hover:underline"><Icon name="Plus" size={16}/> Add Treatment from Pricing List</button>
                    </div>
                 </div>
              </div>
           </div>
        </div>
      </div>
    );
  }
};

// ============================================================================
// 5. MAIN SHELL & STATE MANAGER
// ============================================================================
function App() {
  const [db, setDb] = useState(MOCK_DB_INITIAL);
  const [impersonating, setImpersonating] = useState(null);
  const DevRoleSwitcher = () => (
    <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-2">
      {impersonating && (
        <button onClick={() => setImpersonating(null)} className="px-4 py-2 bg-white text-stone-800 text-xs font-bold uppercase tracking-widest rounded-full shadow-lg border border-stone-200 flex items-center gap-2 hover:bg-stone-50">
          <Icon name="Eye" size={14}/> Change Role
        </button>
      )}
      {!impersonating && (
        <div className="bg-white/95 backdrop-blur p-5 rounded-3xl shadow-2xl border border-stone-200 w-80 flex flex-col gap-3 slide-in-from-bottom-5">
          <h3 className="text-xs font-bold uppercase tracking-widest text-stone-400 mb-2">Prototype Impersonator</h3>
          <button onClick={() => setImpersonating({role: 'clinician'})} className="w-full py-3 bg-stone-900 text-white rounded-xl text-sm font-medium flex items-center justify-center gap-2 hover:bg-stone-800 hover:-translate-y-0.5 transition-all shadow-md">
             <Icon name="Building" size={16}/> View as Clinician / Admin
          </button>
          <div className="border-t border-stone-100 my-2 pt-3">
            <p className="text-xs text-stone-500 mb-2 font-medium">View as Client in State:</p>
            {db.clients.map(c => {
               const cons = db.consultations.find(cons => cons.client_id === c.id);
               return (
                 <button key={c.id} onClick={() => setImpersonating({role: 'client', id: c.id})} className="w-full text-left py-2 px-3 hover:bg-stone-50 rounded-lg flex justify-between items-center group transition">
                    <span className="text-sm text-stone-700 font-medium group-hover:text-stone-900">{c.full_name}</span>
                    <span className="text-[10px] uppercase font-bold tracking-wider text-amber-700 bg-amber-50 px-2 py-0.5 rounded">{cons?.state || 'none'}</span>
                 </button>
               )
            })}
          </div>
        </div>
      )}
    </div>
  );
  return (
    <React.Fragment>
      {!impersonating && (
        <div className="min-h-screen flex items-center justify-center font-sans p-6">
           <div className="text-center max-w-lg animate-in fade-in">
             <div className="w-20 h-20 rounded-3xl mx-auto mb-7 flex items-center justify-center shadow-xl bg-gradient-to-br from-stone-800 to-stone-950 ring-1 ring-white/10">
               <span className="text-white font-serif text-4xl">A</span>
             </div>
             <p className="text-xs font-bold uppercase tracking-[0.25em] text-amber-700 mb-3">Aesthetic Intelligence</p>
             <h1 className="text-5xl font-serif font-semibold text-stone-800 mb-3">AestheticSim Studio</h1>
             <p className="text-stone-500 mb-8 text-lg">An identity-preserving facial simulation &amp; treatment-planning platform for modern aesthetic clinics.</p>
             <p className="text-sm text-stone-400">Select a role from the menu in the bottom-right to explore the prototype.</p>
           </div>
        </div>
      )}
      {impersonating?.role === 'clinician' && <ClinicianApp db={db} onUpdateDb={setDb} />}
      {impersonating?.role === 'client' && <ClientApp db={db} clientId={impersonating.id} onUpdateDb={setDb} />}
      <DevRoleSwitcher />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
