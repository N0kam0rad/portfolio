<!-- MediaPipe Face Landmarker (real on-device facial analysis) loaded as ESM, exposed to the Babel app via a global -->
<script type="module">
  const VER = '0.10.12';
  const MODEL = 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task';
  let _ready = null;
  window.__loadFaceLandmarker = () => {
    if (_ready) return _ready;
    _ready = (async () => {
      const { FaceLandmarker, FilesetResolver } = await import(`https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@${VER}`);
      const fileset = await FilesetResolver.forVisionTasks(`https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@${VER}/wasm`);
      let landmarker;
      try {
        landmarker = await FaceLandmarker.createFromOptions(fileset, {
          baseOptions: { modelAssetPath: MODEL, delegate: 'GPU' },
          runningMode: 'IMAGE', numFaces: 1,
        });
      } catch (e) {
        landmarker = await FaceLandmarker.createFromOptions(fileset, {
          baseOptions: { modelAssetPath: MODEL, delegate: 'CPU' },
          runningMode: 'IMAGE', numFaces: 1,
        });
      }
      return landmarker;
    })();
    return _ready;
  };
  window.__faceModelAvailable = true;
</script>

const ImageSlider = ({ src }) => {
  const [pos, setPos] = useState(50);
  const ref = useRef(null);
  const move = (x) => {
    if (!ref.current) return;
    const r = ref.current.getBoundingClientRect();
    setPos(Math.max(5, Math.min(95, ((x-r.left)/r.width)*100)));
  };
  return (
    <div ref={ref} className="relative w-full aspect-[3/4] bg-zinc-100 rounded-2xl overflow-hidden cursor-ew-resize select-none border border-zinc-200"
      onMouseMove={e=>move(e.clientX)} onTouchMove={e=>move(e.touches[0].clientX)}>
      <img src={src} className="absolute inset-0 w-full h-full object-cover" style={{filter:'contrast(1.04) brightness(1.03) saturate(0.9)'}} draggable="false" alt="Simulated"/>
      <div className="absolute bottom-3 right-3"><Badge color="sage">Simulated</Badge></div>
      <div className="absolute inset-0 border-r-2 border-white" style={{clipPath:`polygon(0 0,${pos}% 0,${pos}% 100%,0 100%)`}}>

            className={`w-full text-left px-4 py-3 rounded-xl border text-sm transition-all flex items-center gap-3 ${data.flags.includes(f)?'border-amber-400 bg-amber-50 text-amber-900':'border-zinc-200 text-zinc-700 hover:border-zinc-300'}`}>

            {data.noFlags&&<Icon name="Check" size={12} className="text-zinc-900" strokeWidth={3}/>}
          </div>

    const [previews, setPreviews]   = useState({});
    const [uploading, setUploading] = useState(false);
    const [uploadIdx, setUploadIdx] = useState(-1);
    const [done, setDone]           = useState(false);
    const inputRefs = PHOTO_SLOTS.map(() => React.useRef());

    const onFileChange = (i, e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => setPreviews(p => ({ ...p, [i]: ev.target.result }));
      reader.readAsDataURL(file);
    };

    const handleUpload = () => {
      if (!Object.keys(previews).length) return;
      setUploading(true);
      // Animate each filled slot sequentially then complete
      let idx = 0;
      const filled = Object.keys(previews).map(Number);
      const tick = () => {
        if (idx >= filled.length) { setTimeout(() => { setUploading(false); setDone(true); }, 400); return; }
        setUploadIdx(filled[idx]);
        idx++;
        setTimeout(tick, 600);
      };
      setTimeout(tick, 300);
    };

    const hasAny = Object.keys(previews).length > 0;

    return (
      <div className="fade-up">

                    type="file"
                    accept="image/*"
                    className="hidden"
                    onChange={e => onFileChange(i, e)}
                  />
                  <div
                    onClick={() => !uploading && inputRefs[i].current?.click()}
                    className={`aspect-[3/4] rounded-2xl border-2 border-dashed flex flex-col items-center justify-center text-center cursor-pointer transition-all overflow-hidden relative
                      ${previews[i] ? 'border-violet-400 bg-violet-50' : 'border-zinc-200 hover:border-violet-300 hover:bg-zinc-50'}
                      ${uploading ? 'pointer-events-none' : ''}`}
                  >
                    {previews[i] ? (
                      <>
                        <img src={previews[i]} className="absolute inset-0 w-full h-full object-cover rounded-2xl" alt={v}/>
                        {uploading && uploadIdx === i && (
                          <div className="absolute inset-0 bg-violet-600/60 flex items-center justify-center rounded-2xl">
                            <Icon name="Loader" size={24} className="text-white animate-spin"/>
                          </div>
                        )}
                        {(!uploading || uploadIdx !== i) && (
                          <div className="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/50 to-transparent p-2 rounded-b-2xl">
                            <span className="text-[10px] font-semibold text-white uppercase tracking-wide">{v}</span>
                          </div>
                        )}
                        {!uploading && (
                          <div className="absolute top-2 right-2 w-5 h-5 bg-violet-500 rounded-full flex items-center justify-center">
                            <Icon name="Check" size={11} className="text-white"/>
                          </div>
                        )}
                      </>
                    ) : (
                      <div className="p-4 flex flex-col items-center">
                        <Icon name="Camera" size={22} className="text-zinc-300 mb-2"/>
                        <span className="text-xs font-semibold text-zinc-500 uppercase tracking-wide">{v}</span>
                        <span className="text-[10px] text-zinc-400 mt-1">Tap to add</span>
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>
            {!hasAny && (
              <p className="text-center text-xs text-zinc-400 mb-4">Add at least one photo to continue.</p>
            )}
            <button
              onClick={handleUpload}
              disabled={uploading || !hasAny}
              className="w-full py-3.5 bg-zinc-900 text-white font-medium rounded-xl hover:bg-zinc-800 transition flex items-center justify-center gap-2 disabled:opacity-30"
            >
              {uploading
                ? <><Icon name="Loader" size={16} className="animate-spin"/><span>Uploading & checking quality…</span></>
                : <><Icon name="Upload" size={16}/><span>Upload {Object.keys(previews).length > 0 ? `${Object.keys(previews).length} photo${Object.keys(previews).length>1?'s':''}` : '& Submit'}</span></>
              }
            </button>
          </>
        ) : (
          <div className="text-center py-10 fade-up">
            <div className="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-green-100">
              <Icon name="CheckCircle2" size={32} className="text-green-500"/>
            </div>
            <h3 className="text-xl font-serif font-semibold text-zinc-800 mb-2">You're all set.</h3>
            <p className="text-zinc-500 text-sm mb-6">Your provider is reviewing your intake and will have a personalized plan ready before your appointment.</p>
            <button onClick={()=>onComplete(data)} className="px-8 py-3.5 bg-zinc-900 text-white font-medium rounded-xl hover:bg-zinc-800 transition">
              View my dashboard →
            </button>
          </div>
        )}
      </div>
    );
  };

  const stepComponents = [<Step0/>,<Step1/>,<Step2/>,<Step3/>,<Step4/>];

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6 font-sans">
      <div className="max-w-lg w-full">
        <StepDots total={STEPS} current={step}/>
        {stepComponents[step]}
      </div>
    </div>
  );
};

let _flPromise = null;
const getFaceLandmarker = () => {
  if (_flPromise) return _flPromise;
  if (!window.__loadFaceLandmarker) return Promise.reject(new Error('model_unavailable'));
  _flPromise = window.__loadFaceLandmarker();
  return _flPromise;
};

const SKIN_CONCERNS = [
  { key:'hydration', label:'Hydration',  icon:'Droplets',     color:'#38bdf8' },
  { key:'evenness',  label:'Even Tone',  icon:'Palette',      color:'#a78bfa' },
  { key:'redness',   label:'Redness',    icon:'Flame',        color:'#fb7185' },
  { key:'texture',   label:'Texture',    icon:'Waves',        color:'#f59e0b' },
  { key:'pores',     label:'Pores',      icon:'CircleDashed', color:'#f97316' },
  { key:'undereye',  label:'Under-Eye',  icon:'Eye',          color:'#818cf8' },
  { key:'firmness',  label:'Firmness',   icon:'Sparkles',     color:'#34d399' },
];

// MediaPipe FaceMesh (468) landmark index groups
const LM_GROUPS = {
  forehead:[10,67,69,109,108,151,337,338,297,299],
  cheekL:[50,101,118,117,123,205,147],
  cheekR:[280,330,347,346,352,425,376],
  undereyeL:[117,118,119,120,230,231],
  undereyeR:[346,347,348,349,450,451],
  nose:[1,4,5,195,197,51,281],
  chin:[152,175,199,200,148,377],
  jawL:[58,172,136,150,149],
  jawR:[288,397,365,379,378],
  lips:[13,14,0,17,61,291],
};
// which regions feed each concern (for the heatmap overlay)
const CONCERN_REGIONS = {
  hydration:['forehead','cheekL','cheekR'],
  evenness:['forehead','cheekL','cheekR','chin','nose'],
  redness:['cheekL','cheekR','nose','chin'],
  texture:['forehead','cheekL','cheekR','nose'],
  pores:['nose','cheekL','cheekR'],
  undereye:['undereyeL','undereyeR'],
  firmness:['jawL','jawR','chin','cheekL','cheekR'],
};

const clamp01 = v => Math.max(0, Math.min(1, v));
const norm = (v, lo, hi) => clamp01((v - lo) / (hi - lo));
const centroid = (lms, idxs) => {
  let x=0,y=0; idxs.forEach(i=>{ x+=lms[i].x; y+=lms[i].y; }); return { x:x/idxs.length, y:y/idxs.length };
};

// sample average color + local luminance variance around a set of normalized points
function sampleRegion(data, w, h, lms, idxs) {
  let rs=0,gs=0,bs=0,n=0; const lums=[];
  const rad = Math.max(3, Math.round(w*0.013));
  idxs.forEach(i=>{
    const cx=Math.round(lms[i].x*w), cy=Math.round(lms[i].y*h);
    for(let dy=-rad; dy<=rad; dy+=2){ for(let dx=-rad; dx<=rad; dx+=2){
      const x=cx+dx, y=cy+dy; if(x<0||y<0||x>=w||y>=h) continue;
      const p=(y*w+x)*4; const r=data[p],g=data[p+1],b=data[p+2];
      rs+=r; gs+=g; bs+=b; n++; lums.push(0.299*r+0.587*g+0.114*b);
    }}
  });
  if(!n) return { r:0,g:0,b:0,lum:0,std:0,redExcess:0 };
  const r=rs/n,g=gs/n,b=bs/n;
  const mean=lums.reduce((a,c)=>a+c,0)/lums.length;
  const variance=lums.reduce((a,c)=>a+(c-mean)**2,0)/lums.length;
  return { r,g,b,lum:mean, std:Math.sqrt(variance), redExcess:r-(g+b)/2 };
}

// run real analysis on an <img>/<video>-drawable element; returns scores + per-region severity + markers
async function analyzeFace(srcEl) {
  const fl = await getFaceLandmarker();
  const det = fl.detect(srcEl);
  if (!det.faceLandmarks || !det.faceLandmarks.length) { const e=new Error('no_face'); e.code='no_face'; throw e; }
  const lms = det.faceLandmarks[0];
  const natW = srcEl.naturalWidth || srcEl.videoWidth || srcEl.width;
  const natH = srcEl.naturalHeight || srcEl.videoHeight || srcEl.height;
  const scale = Math.min(1, 720/natW);
  const w = Math.round(natW*scale), h = Math.round(natH*scale);
  const cv = document.createElement('canvas'); cv.width=w; cv.height=h;
  const ctx = cv.getContext('2d', { willReadFrequently:true });
  ctx.drawImage(srcEl, 0, 0, w, h);
  let data;
  try { data = ctx.getImageData(0,0,w,h).data; }
  catch(e){ const err=new Error('tainted'); err.code='tainted'; throw err; }

  const reg = {};
  Object.keys(LM_GROUPS).forEach(k=> reg[k]=sampleRegion(data,w,h,lms,LM_GROUPS[k]));

  const faceLum = ['forehead','cheekL','cheekR','nose','chin'].reduce((a,k)=>a+reg[k].lum,0)/5;
  const cheekLum = (reg.cheekL.lum+reg.cheekR.lum)/2;

  // per-region concern intensity (0=clear .. 1=concern)
  const intensity = {};
  Object.keys(CONCERN_REGIONS).forEach(c=>{ intensity[c]={}; });
  CONCERN_REGIONS.redness.forEach(k=> intensity.redness[k]=norm(reg[k].redExcess, 4, 34));
  CONCERN_REGIONS.texture.forEach(k=> intensity.texture[k]=norm(reg[k].std, 7, 26));
  CONCERN_REGIONS.pores.forEach(k=> intensity.pores[k]=norm(reg[k].std, 8, 24));
  CONCERN_REGIONS.evenness.forEach(k=> intensity.evenness[k]=norm(Math.abs(reg[k].lum-faceLum), 5, 42));
  CONCERN_REGIONS.hydration.forEach(k=> intensity.hydration[k]=clamp01(0.6*norm(reg[k].std,7,24)+0.4*norm(150-reg[k].lum,20,110)));
  CONCERN_REGIONS.undereye.forEach(k=> intensity.undereye[k]=norm(cheekLum-reg[k].lum, 2, 46));
  CONCERN_REGIONS.firmness.forEach(k=> intensity.firmness[k]=clamp01(0.55*norm(reg[k].std,7,24)+0.45*norm(reg[k].redExcess,4,30)));

  const scores = {};
  SKIN_CONCERNS.forEach(c=>{
    const vals = Object.values(intensity[c.key]);
    const mean = vals.reduce((a,v)=>a+v,0)/vals.length;
    scores[c.key] = Math.round(100 - 46*mean);
  });
  scores.overall = Math.round(SKIN_CONCERNS.reduce((a,c)=>a+scores[c.key],0)/SKIN_CONCERNS.length);

  // treatment markers anchored to real landmarks, surfaced from weakest concerns
  const cForehead=centroid(lms,LM_GROUPS.forehead);
  const cCheekL=centroid(lms,LM_GROUPS.cheekL), cCheekR=centroid(lms,LM_GROUPS.cheekR);
  const cUnderL=centroid(lms,LM_GROUPS.undereyeL), cUnderR=centroid(lms,LM_GROUPS.undereyeR);
  const cChin=centroid(lms,LM_GROUPS.chin), cNose=centroid(lms,LM_GROUPS.nose), cLips=centroid(lms,LM_GROUPS.lips);
  const markerPool = [
    { concern:'texture',  tx:'Neuromodulator', label:'Tox', at:cForehead },
    { concern:'firmness', tx:'HA Filler / Biostimulator', label:'Volume', at:cCheekL },
    { concern:'firmness', tx:'HA Filler / Biostimulator', label:'Volume', at:cCheekR },
    { concern:'undereye', tx:'PRF / EZ Gel', label:'Under-eye', at:{x:(cUnderL.x+cUnderR.x)/2,y:(cUnderL.y+cUnderR.y)/2} },
    { concern:'texture',  tx:'RF Microneedling', label:'Texture', at:cNose },
    { concern:'hydration',tx:'Lip hydration', label:'Lips', at:cLips },
    { concern:'firmness', tx:'Chin / jaw refinement', label:'Chin', at:cChin },
  ];
  const ranked = [...SKIN_CONCERNS].sort((a,b)=>scores[a.key]-scores[b.key]).slice(0,4).map(c=>c.key);
  const markers = markerPool.filter(m=>ranked.includes(m.concern));

  return { landmarks:lms, scores, intensity, regions:reg, markers,
    summary: ranked.slice(0,3).map(k=>SKIN_CONCERNS.find(c=>c.key===k).label) };
}

const scoreColor = s => s>=80 ? '#16a34a' : s>=65 ? '#ca8a04' : '#e11d48';
const scoreLabel = s => s>=80 ? 'Great' : s>=65 ? 'Fair' : 'Focus area';

// Heatmap canvas: draws the photo + concern overlay anchored to landmarks
const HeatmapCanvas = ({ image, result, concern }) => {
  const ref = useRef(null);
  useEffect(() => {
    const cv = ref.current; if (!cv) return;
    const img = new Image();
    img.onload = () => {
      const maxW = 560; const scale = Math.min(1, maxW/img.naturalWidth);
      const w = Math.round(img.naturalWidth*scale), h = Math.round(img.naturalHeight*scale);
      cv.width=w; cv.height=h;
      const ctx = cv.getContext('2d');
      ctx.clearRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);
      if (concern && result.intensity[concern]) {
        const col = SKIN_CONCERNS.find(c=>c.key===concern).color;
        ctx.globalCompositeOperation = 'multiply';
        CONCERN_REGIONS[concern].forEach(rk => {
          const c = centroid(result.landmarks, LM_GROUPS[rk]);
          const sev = result.intensity[concern][rk] || 0;
          const cx=c.x*w, cy=c.y*h, rad=w*0.16;
          const g = ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
          const a = (0.25 + 0.5*sev).toFixed(2);
          g.addColorStop(0, col+Math.round(a*255).toString(16).padStart(2,'0'));
          g.addColorStop(1, col+'00');
          ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.fill();
        });
        ctx.globalCompositeOperation='source-over';
      }
    };
    img.src = image;
  }, [image, concern, result]);
  return <canvas ref={ref} className="w-full h-auto block rounded-2xl"/>;
};

// Before/After slider on the REAL photo: retouched "after" + treatment marker pins
const RetouchSlider = ({ image, result, showMarkers=true }) => {
  const [pos, setPos] = useState(50);
  const beforeRef = useRef(null), afterRef = useRef(null), wrapRef = useRef(null);
  useEffect(() => {
    const img = new Image();
    img.onload = () => {
      const maxW=560; const scale=Math.min(1,maxW/img.naturalWidth);
      const w=Math.round(img.naturalWidth*scale), h=Math.round(img.naturalHeight*scale);
      [beforeRef.current, afterRef.current].forEach(cv=>{ if(cv){cv.width=w; cv.height=h;} });
      const bctx=beforeRef.current.getContext('2d'); bctx.drawImage(img,0,0,w,h);

// ─── FACIAL BALANCING SIMULATOR (landmark-driven liquify warp) ──────────────────
const SIM_TREATMENTS = [
  { key:'cheeks',   label:'Cheek volume',    icon:'Sparkles', tx:'HA Filler / Biostimulator (midface)' },
  { key:'lips',     label:'Lip enhancement', icon:'Heart',    tx:'HA Filler (lips)' },
  { key:'undereye', label:'Under-eye',       icon:'Eye',      tx:'PRF / EZ Gel' },
  { key:'chin',     label:'Chin balance',    icon:'Triangle', tx:'HA Filler (chin)' },
  { key:'jaw',      label:'Jawline',         icon:'Gem',      tx:'Filler / biostimulator (jaw)' },
  { key:'brow',     label:'Brow lift',       icon:'ChevronUp',tx:'Neuromodulator (brow)' },
  { key:'glow',     label:'Skin glow',       icon:'Droplets', tx:'Microneedling / skincare' },
];
const SIM_INTENSITY = [{k:0.6,l:'Subtle'},{k:1,l:'Natural'},{k:1.6,l:'Bold'}];

// build liquify control points (canvas-pixel space) from normalized landmarks
function buildSimControls(lms, w, h, active, strength) {
  const P = i => ({ x:lms[i].x*w, y:lms[i].y*h });
  const R = Math.min(w,h); const c=[];
  if (active.cheeks){ c.push({t:'bloat',p:P(50), r:R*0.17,s:0.42*strength}); c.push({t:'bloat',p:P(280),r:R*0.17,s:0.42*strength}); }
  if (active.lips){ c.push({t:'bloat',p:P(0),r:R*0.06,s:0.4*strength}); c.push({t:'bloat',p:P(17),r:R*0.065,s:0.5*strength}); }
  if (active.undereye){ c.push({t:'push',p:P(230),r:R*0.10,v:{x:0,y:-R*0.011*strength}}); c.push({t:'push',p:P(450),r:R*0.10,v:{x:0,y:-R*0.011*strength}}); }
  if (active.chin){ c.push({t:'push',p:P(152),r:R*0.14,v:{x:0,y:R*0.02*strength}}); }
  if (active.jaw){ c.push({t:'push',p:P(172),r:R*0.11,v:{x:-R*0.013*strength,y:R*0.006*strength}}); c.push({t:'push',p:P(397),r:R*0.11,v:{x:R*0.013*strength,y:R*0.006*strength}}); }
  if (active.brow){ c.push({t:'push',p:P(105),r:R*0.09,v:{x:0,y:-R*0.013*strength}}); c.push({t:'push',p:P(334),r:R*0.09,v:{x:0,y:-R*0.013*strength}}); }
  return c;
}
// inverse-mapped bilinear warp of an ImageData given control points
function warpImageData(src, w, h, ctrls) {
  const sd=src.data, out=new ImageData(w,h), od=out.data;
  for(let y=0;y<h;y++){ for(let x=0;x<w;x++){
    let dx=0,dy=0;
    for(let k=0;k<ctrls.length;k++){ const cc=ctrls[k]; const ex=x-cc.p.x, ey=y-cc.p.y; const dist=Math.sqrt(ex*ex+ey*ey); if(dist>=cc.r) continue;
      const fall=(1-dist/cc.r)*(1-dist/cc.r);
      if(cc.t==='bloat'){ dx+=-ex*fall*cc.s; dy+=-ey*fall*cc.s; } else { dx+=-cc.v.x*fall; dy+=-cc.v.y*fall; }
    }
    let sx=x+dx, sy=y+dy; if(sx<0)sx=0; if(sy<0)sy=0; if(sx>w-1)sx=w-1; if(sy>h-1)sy=h-1;
    const x0=sx|0, y0=sy|0, x1=x0+1<w?x0+1:x0, y1=y0+1<h?y0+1:y0, fx=sx-x0, fy=sy-y0;
    const i00=(y0*w+x0)*4, i10=(y0*w+x1)*4, i01=(y1*w+x0)*4, i11=(y1*w+x1)*4, o=(y*w+x)*4;
    for(let kk=0;kk<3;kk++){ od[o+kk]=sd[i00+kk]*(1-fx)*(1-fy)+sd[i10+kk]*fx*(1-fy)+sd[i01+kk]*(1-fx)*fy+sd[i11+kk]*fx*fy; }
    od[o+3]=255;
  }}
  return out;
}

const BalancingSimulator = ({ image, landmarks, markers, defaultActive }) => {
  const [active, setActive] = useState(defaultActive || { cheeks:true, lips:false, undereye:true, chin:false, jaw:false, brow:true, glow:true });
  const [intensity, setIntensity] = useState(1);
  const [pos, setPos] = useState(50);
  const [busy, setBusy] = useState(true);
  const [showPins, setShowPins] = useState(true);
  const beforeRef=useRef(null), afterRef=useRef(null), wrapRef=useRef(null);
  const srcData=useRef(null), dims=useRef({w:0,h:0});
  const hasLandmarks = Array.isArray(landmarks) && landmarks.length>200;

  // load image once → before canvas + cached source pixels (if same-origin/dataURL)
  useEffect(()=>{
    let cancelled=false;
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{ if(cancelled) return;
      const maxW=380, scale=Math.min(1,maxW/img.naturalWidth);
      const w=Math.round(img.naturalWidth*scale), h=Math.round(img.naturalHeight*scale);
      dims.current={w,h};
      [beforeRef.current, afterRef.current].forEach(cv=>{ if(cv){cv.width=w; cv.height=h;} });
      const bctx=beforeRef.current.getContext('2d',{willReadFrequently:true}); bctx.drawImage(img,0,0,w,h);
      try { srcData.current = bctx.getImageData(0,0,w,h); } catch(e){ srcData.current=null; }
      renderAfter();
    };
    img.src=image;
    return ()=>{ cancelled=true; };
  }, [image]);

  const renderAfter = () => {
    const cv=afterRef.current, src=srcData.current; if(!cv) return;
    const {w,h}=dims.current; if(!w||!h) return;
    const actx=cv.getContext('2d');
    setBusy(true);
    // warp (only if we have pixels + landmarks)
    if (src && hasLandmarks) {
      const ctrls=buildSimControls(landmarks,w,h,active,intensity);
      const warped = ctrls.length ? warpImageData(src,w,h,ctrls) : src;
      actx.putImageData(warped,0,0);
    } else {
      // fallback: just draw original (glow applied below)
      const img=new Image(); img.crossOrigin='anonymous'; img.onload=()=>{ actx.drawImage(img,0,0,w,h); applyGlow(actx,w,h); }; img.src=image; return;
    }
    applyGlow(actx,w,h);
    setBusy(false);
  };
  const applyGlow = (actx,w,h) => {
    if(!active.glow) return;
    const snap=actx.getImageData(0,0,w,h);
    const tmp=document.createElement('canvas'); tmp.width=w; tmp.height=h; const tctx=tmp.getContext('2d');
    tctx.putImageData(snap,0,0);
    actx.save();
    actx.filter='brightness(1.05) saturate(1.06) contrast(0.98)'; actx.drawImage(tmp,0,0);
    actx.globalAlpha=0.3; actx.filter='blur(2px) brightness(1.04)'; actx.drawImage(tmp,0,0);
    actx.restore(); actx.globalAlpha=1; actx.filter='none';
  };
  useEffect(()=>{ if(srcData.current!==undefined) renderAfter(); }, [active, intensity]);

  const move = x => { const r=wrapRef.current?.getBoundingClientRect(); if(!r) return; setPos(Math.max(4,Math.min(96,((x-r.left)/r.width)*100))); };
  const toggle = k => setActive(a=>({...a,[k]:!a[k]}));
  const anyShape = SIM_TREATMENTS.some(t=>t.key!=='glow' && active[t.key]);

  return (
    <div>
      <div ref={wrapRef} className="relative w-full overflow-hidden rounded-2xl border border-zinc-200 cursor-ew-resize select-none bg-zinc-100"
        onMouseMove={e=>move(e.clientX)} onTouchMove={e=>move(e.touches[0].clientX)}>
        <canvas ref={afterRef} className="w-full h-auto block"/>
        <div className="absolute bottom-3 right-3"><Badge color="sage">Simulated</Badge></div>
        {busy && <div className="absolute top-3 right-3 bg-white/85 rounded-full px-2 py-0.5 text-[10px] font-semibold text-zinc-500 flex items-center gap-1"><Icon name="Loader" size={11} className="animate-spin"/>rendering</div>}
        {showPins && markers?.map((m,i)=>(
          <div key={i} className="absolute -translate-x-1/2 -translate-y-1/2 flex items-center gap-1 pointer-events-none z-10" style={{ left:`${m.at.x*100}%`, top:`${m.at.y*100}%` }}>
            <span className="w-2.5 h-2.5 rounded-full bg-violet-500 ring-2 ring-white shadow"/>
            <span className="text-[9px] font-bold text-white bg-violet-600/90 px-1.5 py-0.5 rounded-full whitespace-nowrap shadow">{m.label}</span>
          </div>
        ))}
        <div className="absolute inset-0 overflow-hidden" style={{clipPath:`polygon(0 0,${pos}% 0,${pos}% 100%,0 100%)`}}>
          <canvas ref={beforeRef} className="w-full h-auto block"/>
          <div className="absolute bottom-3 left-3"><Badge color="zinc">Your photo</Badge></div>
        </div>
        <div className="absolute top-0 bottom-0 flex items-center pointer-events-none" style={{left:`calc(${pos}% - 18px)`}}>
          <div className="w-9 h-9 bg-white rounded-full shadow-xl flex items-center justify-center border border-zinc-200"><Icon name="ChevronsLeftRight" size={15} className="text-zinc-600"/></div>
        </div>
      </div>
      {!hasLandmarks && <p className="text-[11px] text-amber-600 mt-2 flex items-center gap-1"><Icon name="Info" size={12}/> Shape simulation needs a fresh on-device scan (landmarks). Showing skin-glow preview only.</p>}
      <div className="mt-3 flex flex-wrap gap-1.5">
        {SIM_TREATMENTS.map(t=>{
          const on=active[t.key]; const disabled = t.key!=='glow' && !hasLandmarks;
          return (
            <button key={t.key} disabled={disabled} onClick={()=>toggle(t.key)}
              className={`px-2.5 py-1.5 rounded-full text-[11px] font-semibold border flex items-center gap-1 transition ${disabled?'opacity-40 cursor-not-allowed border-zinc-200 text-zinc-400':on?'bg-violet-600 text-white border-violet-600':'border-zinc-200 text-zinc-600 hover:border-zinc-400'}`}>
              <Icon name={t.icon} size={12}/>{t.label}
            </button>
          );
        })}
      </div>
      <div className="mt-3 flex items-center gap-2">
        <span className="text-[11px] font-semibold text-zinc-400 uppercase tracking-wide">Intensity</span>
        <div className="flex gap-1 bg-zinc-100 rounded-lg p-0.5">
          {SIM_INTENSITY.map(o=>(
            <button key={o.l} disabled={!hasLandmarks||!anyShape} onClick={()=>setIntensity(o.k)} className={`px-3 py-1 rounded-md text-[11px] font-semibold transition ${intensity===o.k?'bg-white text-zinc-900 shadow-sm':'text-zinc-500'} ${(!hasLandmarks||!anyShape)?'opacity-40':''}`}>{o.l}</button>
          ))}
        </div>
        <button onClick={()=>setShowPins(s=>!s)} className="ml-auto text-[11px] font-medium text-zinc-500 hover:text-zinc-700 flex items-center gap-1"><Icon name={showPins?'EyeOff':'Eye'} size={12}/>{showPins?'Hide pins':'Show pins'}</button>
      </div>
    </div>
  );
};

// Full scan flow: choose camera or upload → analyze → results (Lovi-style)
const SkinScan = ({ onComplete, onClose, ctaLabel='Use these results →' }) => {
  const [mode, setMode] = useState(null);       // null | 'camera' | 'upload'
  const [phase, setPhase] = useState('choose'); // choose | capture | analyzing | results | error
  const [image, setImage] = useState(null);
  const [result, setResult] = useState(null);
  const [err, setErr] = useState('');
  const [concern, setConcern] = useState(null);
  const videoRef = useRef(null), streamRef = useRef(null), fileRef = useRef(null);

  const stopCamera = () => { if(streamRef.current){ streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; } };
  useEffect(()=>()=>stopCamera(), []);

  const startCamera = async () => {
    setMode('camera'); setErr('');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user', width:{ideal:1280}, height:{ideal:1280} }, audio:false });
      streamRef.current = stream;
      setPhase('capture');
      setTimeout(()=>{ if(videoRef.current){ videoRef.current.srcObject=stream; videoRef.current.play(); } }, 50);
    } catch(e){ setErr('Camera access was blocked. You can upload a photo instead.'); setPhase('error'); }
  };

  const analyzeEl = async (el, dataUrl) => {
    setImage(dataUrl); setPhase('analyzing'); setErr('');
    try {
      const r = await analyzeFace(el);
      setResult(r); setConcern(null); setPhase('results');
    } catch(e){
      const msg = e.code==='no_face' ? "We couldn't find a clear face. Use even, front-facing light and fill the frame."
        : e.code==='tainted' ? "That image can't be analyzed (cross-origin). Try uploading a photo from your device."
        : e.message==='model_unavailable' ? "The analysis model couldn't load. Check your connection and try again."
        : "Analysis failed to load. Please try again.";

    const v = videoRef.current; if(!v) return;
    const cv = document.createElement('canvas'); cv.width=v.videoWidth; cv.height=v.videoHeight;
    cv.getContext('2d').drawImage(v,0,0);
    const url = cv.toDataURL('image/jpeg', 0.92);
    stopCamera();
    const img = new Image(); img.onload=()=>analyzeEl(img,url); img.src=url;
  };

    const f = e.target.files?.[0]; if(!f) return;
    setMode('upload');
    const reader = new FileReader();

            <button onClick={()=>setConcern(null)} className={`px-2.5 py-1 rounded-full text-[11px] font-semibold border ${!concern?'bg-zinc-900 text-white border-zinc-900':'border-zinc-200 text-zinc-500'}`}>Photo</button>
            {SKIN_CONCERNS.map(c=>(
              <button key={c.key} onClick={()=>setConcern(c.key)} className={`px-2.5 py-1 rounded-full text-[11px] font-semibold border transition ${concern===c.key?'text-white border-transparent':'border-zinc-200 text-zinc-600 hover:border-zinc-400'}`} style={concern===c.key?{background:c.color}:{}}>{c.label}</button>
            ))}
          </div>
        </div>

        <div className="space-y-2.5">
          {SKIN_CONCERNS.map(c=>{
            const s=result.scores[c.key];
            return (
              <button key={c.key} onClick={()=>setConcern(c.key)} className={`w-full flex items-center gap-3 p-2.5 rounded-xl border text-left transition ${concern===c.key?'border-zinc-400 bg-zinc-50':'border-zinc-100 hover:border-zinc-200'}`}>
                <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style={{background:c.color+'22'}}><Icon name={c.icon} size={15} style={{color:c.color}}/></div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center justify-between"><span className="text-sm font-medium text-zinc-700">{c.label}</span><span className="text-xs font-bold" style={{color:scoreColor(s)}}>{s}</span></div>
                  <div className="h-1.5 bg-zinc-100 rounded-full mt-1 overflow-hidden"><div className="h-full rounded-full" style={{width:`${s}%`, background:scoreColor(s)}}/></div>
                </div>
              </button>
            );
          })}
        </div>
      </div>

      <div className="mt-6">
        <h3 className="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Facial balancing simulation — see your result</h3>
        <BalancingSimulator image={image} landmarks={result.landmarks} markers={result.markers}/>
        <p className="text-[11px] text-zinc-400 mt-3">Toggle treatments to preview the shape change on your own face, then drag to compare. This is an approximate planning visual driven by your facial landmarks — not a guaranteed outcome.</p>
      </div>

      <div className="flex gap-3 mt-6">
        <button onClick={reset} className="px-5 py-3 border border-zinc-200 text-zinc-600 rounded-xl text-sm hover:bg-zinc-50">Rescan</button>
        <button onClick={()=>onComplete && onComplete({ scores:result.scores, summary:result.summary, image, markers:result.markers, landmarks:result.landmarks })} className="flex-1 px-6 py-3 bg-zinc-900 text-white font-medium rounded-xl text-sm hover:bg-zinc-800">{ctaLabel}</button>
      </div>
    </div>
  );
};

const ClinicianApp = ({ db, onUpdateDb, settings }) => {

  const [reviewTab, setReviewTab] = useState('plan');
  const [draft, setDraft] = useState(null);
  const [txCategory, setTxCategory] = useState('both');           // both | injectable | facial
  const [addSel, setAddSel] = useState('');                        // dropdown selection
  const [custom, setCustom] = useState({ tx:'', desc:'', benefits:'', category:'injectable', low:0, high:0, units:1, unit:'units' });
  const [showCustom, setShowCustom] = useState(false);

  // Keep draft in sync whenever the selected client changes
  useEffect(() => {
    if (selectedId && db.plans?.[selectedId]) {
      const p = JSON.parse(JSON.stringify(db.plans[selectedId]));
      if (!p.products) p.products = [];
      setDraft(p);
      setTxCategory('both'); setAddSel(''); setShowCustom(false);
      setCustom({ tx:'', desc:'', benefits:'', category:'injectable', low:0, high:0, units:1, unit:'units' });
    }
  }, [selectedId]);

  const toggleItem = id => setDraft(p=>p?{...p,items:p.items.map(i=>i.id===id?{...i,enabled:!i.enabled}:i)}:p);
  const updateItem = (id,field,val) => setDraft(p=>p?{...p,items:p.items.map(i=>i.id===id?{...i,[field]:val}:i)}:p);
  const removeItem = id => setDraft(p=>p?{...p,items:p.items.filter(i=>i.id!==id)}:p);
  const idSeq = useRef(0);
  const nextId = () => { idSeq.current += 1; return 'tx_added_'+idSeq.current; };

  const addFromLibrary = () => {
    const lib = TREATMENT_LIBRARY.find(l=>l.tx===addSel); if(!lib) return;
    setDraft(p=>({...p, items:[...p.items, { id:nextId(), tx:lib.tx, units:lib.units, low:lib.low, high:lib.high, rationale:lib.rationale, enabled:true, phase:1, roi:lib.roi, longevity:lib.longevity, category:lib.category }]}));
    setAddSel('');
  };
  const addCustom = () => {
    if(!custom.tx.trim() || !custom.desc.trim() || !custom.benefits.trim()) return;
    setDraft(p=>({...p, items:[...p.items, { id:nextId(), tx:custom.tx.trim(), units:Number(custom.units)||1, low:Number(custom.low)||0, high:Number(custom.high)||0, rationale:custom.desc.trim(), benefits:custom.benefits.trim(), enabled:true, phase:1, roi:7, longevity:'—', category:custom.category, custom:true }]}));
    setCustom({ tx:'', desc:'', benefits:'', category:'injectable', low:0, high:0, units:1, unit:'units' });
    setShowCustom(false);
  };
  const toggleProduct = prod => setDraft(p=>{ const has=(p.products||[]).some(x=>x.id===prod.id); return {...p, products: has ? p.products.filter(x=>x.id!==prod.id) : [...(p.products||[]), prod]}; });
  const customValid = custom.tx.trim() && custom.desc.trim() && custom.benefits.trim();

  const cols = {
    booked: db.clients.filter(c=>c.state==='booked'||c.state==='invited'),
    analyzing: db.clients.filter(c=>c.state==='analyzing'),
    review: db.clients.filter(c=>c.state==='needs_review'),
    approved: db.clients.filter(c=>c.state==='approved'),
  };

  const openReview = (id) => { setSelectedId(id); setReviewTab('board'); setView('review'); };

  const approve = (id) => {
    onUpdateDb(p=>({...p, clients:p.clients.map(c=>c.id===id?{...c,state:'approved'}:c)}));
    setView('dashboard');
  };

  if (view==='dashboard') return (
    <div className="min-h-screen font-sans flex flex-col">
      <header className="bg-gradient-to-r from-zinc-950 to-zinc-900 px-6 py-4 flex items-center justify-between text-white shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 bg-white/10 rounded-lg flex items-center justify-center"><Icon name="Stethoscope" size={16}/></div>
          <div>
            <h1 className="text-base font-serif font-medium">{settings?.branding?.clinicName||db.organization.name}</h1>
            <p className="text-zinc-400 text-xs">Provider Dashboard · Dr. Aisha</p>
          </div>
        </div>
        <div className="flex items-center gap-4 text-sm text-zinc-300">
          <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-violet-400"/>{cols.review.length} pending review</span>
          <div className="w-8 h-8 bg-zinc-700 rounded-full flex items-center justify-center"><Icon name="User" size={15}/></div>
        </div>
      </header>
      <main className="flex-grow p-6 overflow-x-auto">

            { key:'analyzing', label:'AI Processing', color:'text-blue-600', bg:'bg-blue-50/40 border-blue-100', cnt:'bg-blue-100 text-blue-700' },
            { key:'review', label:'Needs Review', color:'text-violet-700', bg:'bg-violet-50/40 border-violet-200', cnt:'bg-violet-100 text-violet-800' },

                        <p className="text-xs text-zinc-400">Age {c.age} · {c.provider}</p>
                      </div>
                    </div>
                    {c.intake?.goals && <div className="flex flex-wrap gap-1 mb-3">{c.intake.goals.slice(0,2).map(g=><Badge key={g} color="zinc">{g}</Badge>)}</div>}
                    {c.intake?.glp1 && <Badge color="sage">GLP-1 pathway</Badge>}
                    {c.state==='needs_review' && <button className="w-full mt-2 py-1.5 bg-zinc-900 text-white text-xs font-medium rounded-lg">Review & Build Board →</button>}
                    {c.state==='approved' && <p className="text-xs text-green-600 flex items-center gap-1 mt-1"><Icon name="CheckCircle2" size={12}/> Plan approved & sent</p>}
                    {c.state==='analyzing' && <p className="text-xs text-blue-500 flex items-center gap-1 mt-1"><Icon name="Activity" size={12}/> Generating analysis…</p>}
                    {(c.state==='invited'||c.state==='booked') && <p className="text-xs text-zinc-400 flex items-center gap-1 mt-1"><Icon name="Clock" size={12}/> Awaiting client intake</p>}
                  </div>
                ))}
                {cols[col.key].length===0&&<p className="text-center text-zinc-300 text-xs py-6">Empty</p>}
              </div>
            </div>
          ))}
        </div>
      </main>
    </div>
  );

  const client = db.clients.find(c=>c.id===selectedId);

  return (

        <button onClick={()=>setView('dashboard')} className="p-1.5 hover:bg-zinc-100 rounded-lg transition"><Icon name="ChevronLeft" size={20} className="text-zinc-500"/></button>
        <div className="flex-1 min-w-0">
          <h1 className="font-serif text-lg font-semibold text-zinc-800 truncate">Reviewing: {client.name}</h1>
          <p className="text-xs text-zinc-400">AI draft ready · Age {client.age} · {client.intake?.aesthetic}</p>
        </div>
        {client.intake?.glp1 && <Badge color="sage">GLP-1</Badge>}
        <div className="flex gap-2">
          <button className="px-4 py-2 border border-zinc-200 text-zinc-700 text-sm font-medium rounded-lg hover:bg-zinc-50">Save Draft</button>
          <button onClick={()=>approve(selectedId)} className="px-5 py-2 bg-zinc-900 text-white text-sm font-medium rounded-lg hover:bg-zinc-800 shadow-sm">Approve & Send →</button>
        </div>
      </header>
      <div className="flex border-b border-zinc-200 px-4 bg-white shrink-0">
        {[{key:'board',label:'Consultation Board',icon:'FileText'},{key:'plan',label:'Edit Plan',icon:'Sliders'},{key:'sim',label:'Simulations',icon:'Eye'}].map(t=>(
          <button key={t.key} onClick={()=>setReviewTab(t.key)}
            className={`flex items-center gap-1.5 px-4 py-3 text-sm font-medium border-b-2 transition-all ${reviewTab===t.key?'border-zinc-900 text-zinc-900':'border-transparent text-zinc-500 hover:text-zinc-700'}`}>
            <Icon name={t.icon} size={14}/>{t.label}
          </button>

      <div className="flex-grow overflow-hidden">
        {reviewTab==='board' && (
          <div className="h-full overflow-y-auto scrollbar-thin">
            <ConsultationBoard client={client} plan={plan} db={db}/>

              <div className="bg-white rounded-2xl border border-zinc-200 p-4">

                  <div className="w-12 h-12 rounded-xl overflow-hidden bg-zinc-100">

                  <div>
                    <p className="font-medium text-zinc-800">{client.name}</p>

                  <p className="text-[10px] text-zinc-400 flex items-center gap-1 pt-1"><Icon name="Info" size={11}/> Partner products pay the clinic a referral payout. Disclose per your local regulations.</p>

        )}
        {reviewTab==='sim' && (
          <div className="h-full overflow-y-auto scrollbar-thin p-8">
            <h3 className="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-6">Aesthetic Simulations</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-3xl">
              {['Full Facial Balancing','Neuromodulator Only','Biostimulator / Collagen', client.intake?.glp1?'Weight-Loss + Support':'Skin Rejuvenation'].map(t=>(
                <div key={t}>
                  <ImageSlider src={client.photo}/>
                  <p className="font-serif text-zinc-800 mt-3 text-sm">{t}</p>
                  <p className="text-xs text-zinc-400 mt-0.5 flex items-center gap-1"><Icon name="ShieldCheck" size={11} className="text-green-500"/> Identity validated</p>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ─── CLIENT APP ─────────────────────────────────────────────────────────────────
const ClientApp = ({ db, clientId, onUpdateDb, settings }) => {

  const isApproved = client?.state==='approved';

  if ((client?.state==='booked'||client?.state==='invited') && !showIntake) {

        </div>
      </div>
    );

  if ((client?.state==='booked'||client?.state==='invited') && showIntake) {

      onUpdateDb(p=>({...p, clients:p.clients.map(c=>c.id===clientId?{...c,intake,state:'analyzing'}:c)}));

                <div className="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center shrink-0"><Icon name="Activity" size={22} className="text-blue-500"/></div>
                <div>
                  <h3 className="font-semibold text-zinc-800 mb-1">Your intake is being reviewed</h3>

                <div className="flex gap-5">
                  <div className="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center shrink-0"><Icon name="CheckCircle2" size={24} className="text-green-400"/></div>
                  <div>
                    <h3 className="text-lg font-semibold mb-1">Your assessment is ready</h3>
                    <p className="text-zinc-400 text-sm">Dr. Aisha has completed your facial analysis, treatment plan, and skincare journey.</p>

                <h4 className="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-4">Quick Actions</h4>
                <div className="space-y-2">
                  <button className="w-full flex items-center gap-2 text-sm text-zinc-700 hover:text-violet-700 py-1.5 transition font-medium"><Icon name="MessageSquare" size={16}/> Message my provider</button>
                  <button onClick={()=>setView('scan')} className="w-full flex items-center gap-2 text-sm text-zinc-700 hover:text-violet-700 py-1.5 transition font-medium"><Icon name="ScanFace" size={16}/> {client.skinScan?'Re-run skin analysis':'Run skin analysis'}</button>

            <div className="bg-white p-6 rounded-3xl border border-zinc-200 shadow-sm">
              <div className="flex items-center justify-between mb-4">
                <h4 className="text-xs font-bold uppercase tracking-wider text-zinc-400">Skin Analysis</h4>
                <button onClick={()=>setView('scan')} className="text-xs font-semibold text-violet-700 hover:text-violet-800 flex items-center gap-1"><Icon name="ScanFace" size={13}/> {client.skinScan?'Re-scan':'Start scan'}</button>
              </div>
              {client.skinScan ? (
                <div className="flex flex-wrap items-center gap-2">
                  <div className="text-center pr-3 mr-1 border-r border-zinc-100">
                    <p className="text-2xl font-serif font-semibold" style={{color:scoreColor(client.skinScan.scores.overall)}}>{client.skinScan.scores.overall}</p>
                    <p className="text-[10px] text-zinc-400 uppercase tracking-wide">Overall</p>
                  </div>
                  {SKIN_CONCERNS.map(c=>(
                    <div key={c.key} className="px-2.5 py-1.5 rounded-lg bg-zinc-50 border border-zinc-100 text-center min-w-[68px]">
                      <p className="text-sm font-bold" style={{color:scoreColor(client.skinScan.scores[c.key])}}>{client.skinScan.scores[c.key]}</p>
                      <p className="text-[10px] text-zinc-400">{c.label}</p>

                  ))}
                  <p className="w-full text-xs text-zinc-400 mt-1">Focus areas: {client.skinScan.summary.join(' · ')} — shared with your provider.</p>

                <div className="flex items-center gap-4">

                <div key={label} className={`p-6 rounded-3xl border ${accent}`}>
                  <div className="flex items-center gap-2 mb-5">
                    <Icon name={icon} size={18} className="text-zinc-600"/>
                    <h3 className="font-serif text-lg text-zinc-800 font-medium">{label}</h3>
                  </div>
                  <div className="space-y-4">
                    {steps.map((s,i)=>(
                      <div key={i} className="flex gap-3">
                        <span className="w-6 h-6 rounded-full bg-white border border-zinc-200 text-zinc-600 text-xs font-bold flex items-center justify-center shrink-0">{i+1}</span>
                        <div>
                          <p className="font-semibold text-zinc-800 text-sm">{s.step}</p>
                          <p className="text-xs text-zinc-600">{s.product}</p>
                          <p className="text-xs text-zinc-400 mt-0.5">{s.reason}</p>

                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <div>
              <h3 className="text-sm font-bold text-zinc-700 mb-4">12-Week Skin Phase Plan</h3>
              <div className="relative">
                <div className="absolute top-5 left-5 right-5 h-0.5 bg-zinc-200 z-0"/>
                <div className="relative z-10 grid grid-cols-5 gap-3">
                  {SKINCARE_PHASES.map((p,i)=>(
                    <div key={i} className="text-center">
                      <div className="w-10 h-10 rounded-full bg-white border-2 border-zinc-900 flex items-center justify-center mx-auto mb-3 text-xs font-bold text-zinc-800">{i+1}</div>

                      <p className="text-xs font-semibold text-zinc-800 mb-1">{p.title}</p>

                    </div>
                  ))}

              </div>
            </div>
          </div>
        )}
      </main>
    </div>
    {showBoard && plan && (
      <PrintableBoard client={client} plan={plan} db={db} settings={settings} onClose={()=>setShowBoard(false)}/>
    )}
  </React.Fragment>
  );
};
