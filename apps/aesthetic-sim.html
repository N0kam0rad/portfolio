// ─── Icon helper ───────────────────────────────────────────────────────────────
function Icon({ name, size=18, className='', strokeWidth=2, ...rest }) {
  const node = window.lucide?.icons?.[name] || null;
  return React.createElement('svg',{
    xmlns:'http://www.w3.org/2000/svg', width:size, height:size,
    viewBox:'0 0 24 24', fill:'none', stroke:'currentColor',
    strokeWidth, strokeLinecap:'round', strokeLinejoin:'round', className, ...rest,
  }, node ? node.map(([tag,attrs],i)=>React.createElement(tag,{key:i,...attrs})) : null);
}

// ─── Shared UI ─────────────────────────────────────────────────────────────────
const Badge = ({children, color='stone'}) => {
  const colors = { amber:'bg-amber-50 text-amber-800 border-amber-200', green:'bg-green-50 text-green-700 border-green-200', blue:'bg-blue-50 text-blue-700 border-blue-200', red:'bg-red-50 text-red-700 border-red-200', stone:'bg-stone-100 text-stone-600 border-stone-200', sage:'bg-sage-50 text-sage-700 border-sage-200' };
  return <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full border text-[10px] font-bold uppercase tracking-wider ${colors[color]||colors.stone}`}>{children}</span>;
};

const ROIBar = ({score}) => (
  <div className="flex items-center gap-2">
    <div className="flex gap-0.5">{Array.from({length:10}).map((_,i)=><div key={i} className={`w-2 h-2 rounded-sm ${i<score?'bg-amber-500':'bg-stone-200'}`}/>)}</div>
    <span className="text-[10px] font-bold text-amber-700">{score}/10 ROI</span>
  </div>
);

const ImageSlider = ({ src }) => {
  const [pos, setPos] = useState(50);
  const ref = useRef(null);
  const move = (x) => {
    if (!ref.current) return;
    const r = ref.current.getBoundingClientRect();
    setPos(Math.max(5, Math.min(95, ((x-r.left)/r.width)*100)));
  };
  return (
    <div ref={ref} className="relative w-full aspect-[3/4] bg-stone-100 rounded-2xl overflow-hidden cursor-ew-resize select-none border border-stone-200"
      onMouseMove={e=>move(e.clientX)} onTouchMove={e=>move(e.touches[0].clientX)}>
      <img src={src} className="absolute inset-0 w-full h-full object-cover" style={{filter:'contrast(1.04) brightness(1.03) saturate(0.9)'}} draggable="false" alt="Simulated"/>
      <div className="absolute bottom-3 right-3"><Badge color="sage">Simulated</Badge></div>
      <div className="absolute inset-0 border-r-2 border-white" style={{clipPath:`polygon(0 0,${pos}% 0,${pos}% 100%,0 100%)`}}>
        <img src={src} className="w-full h-full object-cover" draggable="false" alt="Current"/>
        <div className="absolute bottom-3 left-3"><Badge color="stone">Current</Badge></div>
      </div>
      <div className="absolute top-0 bottom-0 flex items-center justify-center" style={{left:`calc(${pos}% - 22px)`}}>
        <div className="w-11 h-11 bg-white rounded-full shadow-xl flex items-center justify-center border border-stone-200">
          <Icon name="ChevronsLeftRight" size={16} className="text-stone-600"/>
        </div>
      </div>
    </div>
  );
};

    ))}
  </div>
);

// ─── INTAKE WIZARD ──────────────────────────────────────────────────────────────
const IntakeWizard = ({ clientName, onComplete }) => {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({ goals:[], treatments:[], aesthetic:'', budget:'', timeline:'', downtime:'', glp1:false, weightLoss:false, flags:[] });
  const toggle = (key, val) => setData(p => ({ ...p, [key]: p[key].includes(val) ? p[key].filter(x=>x!==val) : [...p[key], val] }));
  const set = (key, val) => setData(p => ({...p, [key]:val}));
  const STEPS = 5;

  const Step0 = () => (
    <div className="fade-up">
      <p className="text-xs font-bold uppercase tracking-[0.2em] text-amber-700 mb-2">Aesthetic Journey Studio</p>
      <h2 className="text-3xl font-serif font-semibold text-stone-800 mb-3">Hello{clientName?`, ${clientName.split(' ')[0]}`:''}.</h2>
      <p className="text-stone-500 mb-8 leading-relaxed">This short intake takes about 5 minutes and helps your provider build a personalized treatment and skincare plan before you arrive. Nothing is a commitment — just a starting point.</p>
      <p className="text-sm font-medium text-stone-700 mb-4">What brings you in today? <span className="text-stone-400 font-normal">(select all that apply)</span></p>
      <div className="flex flex-wrap gap-2 mb-8">
        {GOALS.map(g=>(
          <button key={g} onClick={()=>toggle('goals',g)}
            className={`px-4 py-2 rounded-full border text-sm font-medium transition-all ${data.goals.includes(g)?'bg-stone-900 text-white border-stone-900':'border-stone-300 text-stone-700 hover:border-stone-500'}`}>{g}</button>
        ))}
      </div>
      <button disabled={!data.goals.length} onClick={()=>setStep(1)}
        className="px-8 py-3.5 bg-stone-900 text-white font-medium rounded-xl hover:bg-stone-800 transition disabled:opacity-30 disabled:cursor-not-allowed">
        Continue <span className="ml-1 opacity-60">→</span>
      </button>
    </div>
  );

  const Step1 = () => (
    <div className="fade-up">
      <h2 className="text-2xl font-serif font-semibold text-stone-800 mb-2">Your aesthetic preference</h2>
      <p className="text-stone-500 mb-6 text-sm">This helps your provider calibrate the plan to your comfort zone.</p>
      <div className="space-y-3 mb-8">
        {[['Very subtle','I want to look like myself, just more rested'],['Natural but noticeable','I want people to notice something changed, not what'],['Balanced optimization','I'm open to the full picture — provider guides me'],['Dramatic change','I want significant improvement — provider will discuss expectations']].map(([label,desc])=>(
          <button key={label} onClick={()=>set('aesthetic',label)}
            className={`w-full text-left p-4 rounded-2xl border-2 transition-all ${data.aesthetic===label?'border-stone-900 bg-stone-50':'border-stone-200 hover:border-stone-300'}`}>
            <p className={`font-semibold text-sm mb-0.5 ${data.aesthetic===label?'text-stone-900':'text-stone-700'}`}>{label}</p>
            <p className="text-xs text-stone-500">{desc}</p>
          </button>
        ))}
      </div>
      <p className="text-sm font-medium text-stone-700 mb-3">Treatments you're curious about: <span className="text-stone-400 font-normal">(optional)</span></p>
      <div className="flex flex-wrap gap-2 mb-8">
        {TREATMENTS.map(t=>(
          <button key={t} onClick={()=>toggle('treatments',t)}
            className={`px-3 py-1.5 rounded-full border text-xs font-medium transition-all ${data.treatments.includes(t)?'bg-amber-100 text-amber-800 border-amber-300':'border-stone-200 text-stone-600 hover:border-stone-400'}`}>{t}</button>
        ))}
      </div>
      <div className="flex gap-3">
        <button onClick={()=>setStep(0)} className="px-6 py-3 border border-stone-200 text-stone-600 rounded-xl hover:bg-stone-50 transition text-sm">Back</button>
        <button disabled={!data.aesthetic} onClick={()=>setStep(2)} className="px-8 py-3 bg-stone-900 text-white font-medium rounded-xl hover:bg-stone-800 transition text-sm disabled:opacity-30">Continue →</button>
      </div>
    </div>
  );

  const Step2 = () => (
    <div className="fade-up">
      <h2 className="text-2xl font-serif font-semibold text-stone-800 mb-2">A few health questions</h2>
      <p className="text-stone-500 mb-6 text-sm leading-relaxed">These help your provider keep your consultation safe. Select anything that applies — your answers are private and only visible to your care team.</p>
      {data.flags.length > 0 && (
        <div className="mb-5 p-4 bg-amber-50 border border-amber-200 rounded-2xl flex gap-3">
          <Icon name="AlertTriangle" size={18} className="text-amber-600 shrink-0 mt-0.5"/>
          <p className="text-sm text-amber-800">Your provider will review these flags before making treatment recommendations. Some services may need to be postponed.</p>
        </div>
      )}
      <div className="space-y-2 mb-6">
        {MED_FLAGS.map(f=>(
          <button key={f} onClick={()=>toggle('flags',f)}
            className={`w-full text-left px-4 py-3 rounded-xl border text-sm transition-all flex items-center gap-3 ${data.flags.includes(f)?'border-amber-400 bg-amber-50 text-amber-900':'border-stone-200 text-stone-700 hover:border-stone-300'}`}>
            <div className={`w-5 h-5 rounded border-2 flex items-center justify-center shrink-0 transition-all ${data.flags.includes(f)?'border-amber-500 bg-amber-500':'border-stone-300'}`}>

            {f}
          </button>
        ))}
      </div>
      <div className="p-4 bg-stone-50 rounded-2xl border border-stone-200 mb-6">
        <p className="text-sm font-medium text-stone-700 mb-3">Are you currently on a GLP-1 medication (Ozempic, Wegovy, etc.) or planning significant weight loss?</p>
        <div className="flex gap-3">
          {['Yes','No'].map(v=>(
            <button key={v} onClick={()=>{ set('glp1',v==='Yes'); set('weightLoss',v==='Yes'); }}

          ))}
        </div>
        {data.glp1 && <p className="text-xs text-amber-700 mt-2 flex items-center gap-1"><Icon name="Info" size={12}/> Your plan will include a weight-loss facial support pathway.</p>}

      <div className="flex gap-3">
        <button onClick={()=>setStep(1)} className="px-6 py-3 border border-stone-200 text-stone-600 rounded-xl hover:bg-stone-50 transition text-sm">Back</button>
        <button onClick={()=>setStep(3)} className="px-8 py-3 bg-stone-900 text-white font-medium rounded-xl hover:bg-stone-800 transition text-sm">Continue →</button>
      </div>
    </div>
  );

  const Step3 = () => (
    <div className="fade-up">
      <h2 className="text-2xl font-serif font-semibold text-stone-800 mb-2">Budget & timeline</h2>

      <p className="text-sm font-medium text-stone-700 mb-3">Comfortable first-visit budget</p>
      <div className="grid grid-cols-2 gap-2 mb-6">
        {BUDGET_OPTS.map(b=>(
          <button key={b} onClick={()=>set('budget',b)}
            className={`py-2.5 px-4 rounded-xl border text-sm font-medium transition-all text-left ${data.budget===b?'border-stone-900 bg-stone-900 text-white':'border-stone-200 text-stone-700 hover:border-stone-400'}`}>{b}</button>
        ))}
      </div>
      <p className="text-sm font-medium text-stone-700 mb-3">Your timeline</p>
      <div className="space-y-2 mb-6">
        {TIMELINE_OPTS.map(t=>(
          <button key={t} onClick={()=>set('timeline',t)}

        ))}
      </div>
      <p className="text-sm font-medium text-stone-700 mb-3">Downtime tolerance</p>
      <div className="flex flex-wrap gap-2 mb-6">
        {DOWNTIME_OPTS.map(d=>(
          <button key={d} onClick={()=>set('downtime',d)}
            className={`px-4 py-2 rounded-full border text-sm font-medium transition-all ${data.downtime===d?'bg-stone-900 text-white border-stone-900':'border-stone-200 text-stone-700 hover:border-stone-400'}`}>{d}</button>
        ))}
      </div>
      <div className="flex gap-3">
        <button onClick={()=>setStep(2)} className="px-6 py-3 border border-stone-200 text-stone-600 rounded-xl hover:bg-stone-50 transition text-sm">Back</button>
        <button disabled={!data.budget||!data.timeline||!data.downtime} onClick={()=>setStep(4)} className="px-8 py-3 bg-stone-900 text-white font-medium rounded-xl hover:bg-stone-800 transition text-sm disabled:opacity-30">Continue →</button>
      </div>
    </div>
  );

  const Step4 = () => {
    const [uploading, setUploading] = useState(false);
    const [done, setDone] = useState(false);
    const mockUpload = () => { setUploading(true); setTimeout(()=>{ setUploading(false); setDone(true); }, 2200); };
    return (
      <div className="fade-up">
        <h2 className="text-2xl font-serif font-semibold text-stone-800 mb-2">Photo upload</h2>
        <p className="text-stone-500 mb-2 text-sm leading-relaxed">Upload 4 views so your provider can prepare before you arrive. Good lighting, hair pulled back, neutral expression. <strong className="text-stone-700">No filters.</strong></p>
        <div className="mb-4 p-3 bg-stone-50 rounded-xl border border-stone-200 text-xs text-stone-500 flex items-start gap-2">
          <Icon name="Lock" size={13} className="shrink-0 mt-0.5 text-stone-400"/>
          Photos are stored securely and only visible to your care team. You consent to their use for this consultation only.
        </div>
        {!done ? (
          <>
            <div className="grid grid-cols-2 gap-3 mb-6">
              {['Front — Neutral','Front — Smiling','Left Profile','Right Profile'].map((v,i)=>(
                <div key={v} className={`aspect-[3/4] rounded-2xl border-2 border-dashed flex flex-col items-center justify-center p-4 text-center cursor-pointer transition-all ${uploading&&i===0?'border-amber-400 bg-amber-50':'border-stone-200 hover:border-amber-300 hover:bg-stone-50'}`}>
                  {uploading&&i===0 ? <div className="w-10 h-10 shimmer rounded-xl mb-2"/> : <Icon name="Camera" size={22} className="text-stone-300 mb-2"/>}
                  <span className="text-xs font-semibold text-stone-500 uppercase tracking-wide">{v}</span>
                </div>
              ))}

    );
  };

  const stepComponents = [<Step0/>,<Step1/>,<Step2/>,<Step3/>,<Step4/>];

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6 font-sans">

      </div>
    </div>
  );
};

                  <div key={item.id} className={`rounded-2xl border overflow-hidden transition-all ${item.enabled?'border-amber-300':'border-stone-200 opacity-60'}`}>
                    <div className="flex items-center gap-3 p-4 bg-white">
                      <input type="checkbox" checked={item.enabled} onChange={()=>toggleItem(item.id)} className="w-5 h-5 accent-amber-600 cursor-pointer"/>
                      <div className="flex-1 min-w-0">
                        <p className="font-serif text-stone-800 font-medium text-sm">{item.tx}</p>
                        <ROIBar score={item.roi}/>
                      </div>
                      <div className="flex items-center gap-2 shrink-0">
                        <input type="number" value={item.units} min={1} disabled={!item.enabled}
                          onChange={e=>updateItem(item.id,'units',Number(e.target.value))}
                          className="w-16 p-1.5 border border-stone-200 rounded-lg text-sm text-center"/>
                        <span className="text-xs text-stone-500">units</span>
                      </div>
                    </div>
                    {item.enabled&&(
                      <div className="px-4 pb-4 bg-stone-50">
                        <label className="text-[10px] font-bold uppercase tracking-wider text-stone-400 mb-1 block">Clinical Rationale</label>
                        <textarea className="w-full bg-white border border-stone-200 text-sm text-stone-700 rounded-lg p-2 resize-none focus:outline-amber-400" rows={2} value={item.rationale}
                          onChange={e=>updateItem(item.id,'rationale',e.target.value)}/>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
        {reviewTab==='sim' && (
          <div className="h-full overflow-y-auto scrollbar-thin p-8">
            <h3 className="text-xs font-bold uppercase tracking-wider text-stone-400 mb-6">Aesthetic Simulations</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-3xl">
              {['Full Facial Balancing','Neuromodulator Only','Biostimulator / Collagen', client.intake?.glp1?'Weight-Loss + Support':'Skin Rejuvenation'].map(t=>(
                <div key={t}>
                  <ImageSlider src={client.photo}/>
                  <p className="font-serif text-stone-800 mt-3 text-sm">{t}</p>
                  <p className="text-xs text-stone-400 mt-0.5 flex items-center gap-1"><Icon name="ShieldCheck" size={11} className="text-green-500"/> Identity validated</p>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ─── CLIENT APP ─────────────────────────────────────────────────────────────────
const ClientApp = ({ db, clientId, onUpdateDb }) => {
  const [view, setView] = useState('dashboard');
  const client = db.clients.find(c=>c.id===clientId);
  const plan = db.plans?.[clientId];
  const isApproved = client?.state==='approved';

  if (client?.state==='invited') {
    return <IntakeWizard clientName={client.name} onComplete={intake=>{
      onUpdateDb(p=>({...p, clients:p.clients.map(c=>c.id===clientId?{...c,intake,state:'analyzing'}:c)}));
    }}/>;
  }

  const fmt = n=>'$'+n.toLocaleString();

  return (
    <div className="min-h-screen font-sans flex flex-col">
      <header className="bg-white/90 backdrop-blur border-b border-stone-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
        <h1 className="font-serif text-lg text-stone-800 font-semibold">{db.organization.name} <span className="text-stone-400 font-sans font-normal text-sm ml-1">Client Portal</span></h1>
        <div className="flex items-center gap-4">
          <button onClick={()=>setView('dashboard')} className={`text-sm font-medium ${view==='dashboard'?'text-stone-900':'text-stone-500 hover:text-stone-800'}`}>Dashboard</button>
          <button onClick={()=>setView('board')} disabled={!isApproved} className={`text-sm font-medium transition ${!isApproved?'text-stone-300 cursor-not-allowed':view==='board'?'text-stone-900':'text-stone-500 hover:text-stone-800'}`}>My Assessment</button>
          <button onClick={()=>setView('skincare')} disabled={!isApproved} className={`text-sm font-medium transition ${!isApproved?'text-stone-300 cursor-not-allowed':view==='skincare'?'text-stone-900':'text-stone-500 hover:text-stone-800'}`}>Skincare Plan</button>
          <div className="w-9 h-9 bg-stone-100 rounded-full flex items-center justify-center"><Icon name="User" size={16} className="text-stone-500"/></div>
        </div>
      </header>
      <main className="flex-grow max-w-4xl mx-auto w-full p-6">
        {view==='dashboard' && (
          <div className="space-y-6 fade-up">
            <h2 className="text-3xl font-serif font-semibold text-stone-800 pt-2">Welcome, {client.name.split(' ')[0]}.</h2>
            {client.state==='analyzing' && (
              <div className="bg-white border border-stone-200 rounded-3xl p-8 flex gap-5 shadow-sm">
                <div className="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center shrink-0"><Icon name="Activity" size={22} className="text-blue-500"/></div>
                <div>
                  <h3 className="font-semibold text-stone-800 mb-1">Your intake is being reviewed</h3>
                  <p className="text-stone-500 text-sm leading-relaxed">AI has analyzed your photos and goals. Dr. Aisha is customizing your personalized consultation board. You'll receive an email when it's ready.</p>
                  <div className="flex gap-2 mt-3 flex-wrap">
                    {(client.intake?.goals||[]).map(g=><Badge key={g} color="stone">{g}</Badge>)}
                    {client.intake?.glp1&&<Badge color="sage">GLP-1 pathway</Badge>}
                  </div>
                </div>
              </div>
            )}
            {isApproved && (
              <div className="bg-gradient-to-br from-stone-900 to-stone-800 rounded-3xl p-8 flex flex-col md:flex-row items-start md:items-center justify-between gap-6 shadow-xl text-white">
                <div className="flex gap-5">
                  <div className="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center shrink-0"><Icon name="CheckCircle2" size={24} className="text-green-400"/></div>
                  <div>
                    <h3 className="text-lg font-semibold mb-1">Your assessment is ready</h3>
                    <p className="text-stone-400 text-sm">Dr. Aisha has completed your facial analysis, treatment plan, and skincare journey.</p>
                  </div>
                </div>
                <div className="flex gap-3 shrink-0">
                  <button onClick={()=>setView('skincare')} className="px-5 py-2.5 bg-white/10 text-white text-sm font-medium rounded-xl hover:bg-white/20 transition">Skincare Plan</button>
                  <button onClick={()=>setView('board')} className="px-5 py-2.5 bg-white text-stone-900 text-sm font-medium rounded-xl hover:bg-stone-100 transition shadow-sm">View My Assessment →</button>
                </div>
              </div>
            )}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
              <div className="bg-white p-6 rounded-3xl border border-stone-200 shadow-sm">
                <h4 className="text-xs font-bold uppercase tracking-wider text-stone-400 mb-5">Upcoming</h4>
                <div className="flex items-center gap-4">
                  <div className="w-14 h-14 bg-stone-50 rounded-2xl border border-stone-100 flex flex-col items-center justify-center shrink-0">
                    <span className="text-[10px] font-bold text-amber-700 uppercase">Jul</span>
                    <span className="text-xl font-serif font-semibold text-stone-800">18</span>
                  </div>
                  <div>
                    <p className="font-medium text-stone-800">Virtual Consultation</p>
                    <p className="text-sm text-stone-500">2:00 PM · 30 min · Video Call</p>
                  </div>
                </div>
              </div>
              <div className="bg-white p-6 rounded-3xl border border-stone-200 shadow-sm">
                <h4 className="text-xs font-bold uppercase tracking-wider text-stone-400 mb-4">Quick Actions</h4>
                <div className="space-y-2">
                  <button className="w-full flex items-center gap-2 text-sm text-stone-700 hover:text-amber-700 py-1.5 transition font-medium"><Icon name="MessageSquare" size={16}/> Message my provider</button>
                  <button className="w-full flex items-center gap-2 text-sm text-stone-700 hover:text-amber-700 py-1.5 transition font-medium"><Icon name="Camera" size={16}/> Upload progress photos</button>
                  <button className="w-full flex items-center gap-2 text-sm text-stone-700 hover:text-amber-700 py-1.5 transition font-medium"><Icon name="CalendarPlus" size={16}/> Book appointment</button>
                </div>
              </div>
            </div>
          </div>
        )}
        {view==='board' && isApproved && plan && (
          <div className="fade-up">
            <ConsultationBoard client={client} plan={plan} db={db}/>
          </div>
        )}
        {view==='skincare' && isApproved && (
          <div className="space-y-8 pb-16 fade-up">
            <div>
              <h2 className="text-3xl font-serif font-semibold text-stone-800 mb-1">Your Skincare Journey</h2>
              <p className="text-stone-500">Prepared by Dr. Aisha · Updated every 4–6 weeks</p>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {[{label:'Morning Routine',steps:SKINCARE_AM,icon:'Sun',accent:'bg-amber-50 border-amber-100'},{label:'Evening Routine',steps:SKINCARE_PM,icon:'Moon',accent:'bg-sage-50 border-sage-100'}].map(({label,steps,icon,accent})=>(
                <div key={label} className={`p-6 rounded-3xl border ${accent}`}>
                  <div className="flex items-center gap-2 mb-5">
                    <Icon name={icon} size={18} className="text-stone-600"/>
                    <h3 className="font-serif text-lg text-stone-800 font-medium">{label}</h3>
                  </div>
                  <div className="space-y-4">
                    {steps.map((s,i)=>(
                      <div key={i} className="flex gap-3">
                        <span className="w-6 h-6 rounded-full bg-white border border-stone-200 text-stone-600 text-xs font-bold flex items-center justify-center shrink-0">{i+1}</span>
                        <div>
                          <p className="font-semibold text-stone-800 text-sm">{s.step}</p>
                          <p className="text-xs text-stone-600">{s.product}</p>
                          <p className="text-xs text-stone-400 mt-0.5">{s.reason}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <div>
              <h3 className="text-sm font-bold text-stone-700 mb-4">12-Week Skin Phase Plan</h3>
              <div className="relative">
                <div className="absolute top-5 left-5 right-5 h-0.5 bg-stone-200 z-0"/>
                <div className="relative z-10 grid grid-cols-5 gap-3">
                  {SKINCARE_PHASES.map((p,i)=>(
                    <div key={i} className="text-center">
                      <div className="w-10 h-10 rounded-full bg-white border-2 border-stone-900 flex items-center justify-center mx-auto mb-3 text-xs font-bold text-stone-800">{i+1}</div>
                      <p className="text-[10px] font-bold uppercase tracking-wider text-amber-700 mb-1">{p.phase}</p>
                      <p className="text-xs font-semibold text-stone-800 mb-1">{p.title}</p>
                      <p className="text-[11px] text-stone-500 leading-relaxed">{p.desc}</p>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
};

// ─── MAIN APP ──────────────────────────────────────────────────────────────────

  const [db, setDb] = useState(MOCK_DB_INITIAL);
  const [persona, setPersona] = useState(null);
  const [panelOpen, setPanelOpen] = useState(false);

  return (
    <React.Fragment>
      {!persona ? (
        <div className="min-h-screen flex items-center justify-center font-sans p-6">
          <div className="text-center max-w-md fade-up">
            <div className="w-20 h-20 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-xl bg-gradient-to-br from-stone-800 to-stone-950 ring-1 ring-white/10">
              <span className="text-white font-serif text-4xl">A</span>
            </div>
            <p className="text-xs font-bold uppercase tracking-[0.25em] text-amber-700 mb-3">Aesthetic Intelligence Platform</p>
            <h1 className="text-5xl font-serif font-semibold text-stone-800 mb-3">AestheticSim</h1>
            <p className="text-stone-500 mb-2 text-lg leading-relaxed">Intake → Analysis → Simulation → Treatment Plan → Skincare Journey</p>
            <p className="text-stone-400 text-sm mb-10">A full consultation operating system for modern medspas.</p>
            <div className="bg-white border border-stone-200 rounded-3xl p-6 shadow-lg text-left space-y-3">
              <p className="text-xs font-bold uppercase tracking-wider text-stone-400 mb-4">Explore the prototype</p>
              <button onClick={()=>setPersona({role:'client',id:'c4'})} className="w-full py-3 bg-stone-900 text-white rounded-xl text-sm font-medium flex items-center gap-3 px-4 hover:bg-stone-800 transition">
                <Icon name="UserCheck" size={16}/>
                <div className="text-left"><div>New Client — Complete Intake</div><div className="text-white/50 text-xs">5-step intake wizard → AI analysis flow</div></div>
              </button>
              <div className="border-t border-stone-100 pt-3">
                <p className="text-xs text-stone-500 mb-2 font-medium">Provider / Clinician</p>
                <button onClick={()=>setPersona({role:'clinician'})} className="w-full py-3 border border-stone-200 text-stone-700 rounded-xl text-sm font-medium flex items-center gap-3 px-4 hover:bg-stone-50 transition">
                  <Icon name="Stethoscope" size={16} className="text-stone-500"/>
                  <div className="text-left"><div>Clinician Dashboard</div><div className="text-stone-400 text-xs">Pipeline · Consultation Board · Edit Plans</div></div>
                </button>
              </div>
              <div className="border-t border-stone-100 pt-3">
                <p className="text-xs text-stone-500 mb-2 font-medium">View as existing client</p>
                {db.clients.filter(c=>c.id!=='c4').map(c=>{
                  const labels = { needs_review:'Board in review', approved:'Plan approved', analyzing:'AI analyzing' };
                  return (
                    <button key={c.id} onClick={()=>setPersona({role:'client',id:c.id})}
                      className="w-full flex items-center justify-between text-sm px-3 py-2 hover:bg-stone-50 rounded-xl group transition">
                      <div className="flex items-center gap-2">
                        <div className="w-7 h-7 rounded-full overflow-hidden bg-stone-100 shrink-0">{c.photo&&<img src={c.photo} className="w-full h-full object-cover"/>}</div>
                        <span className="text-stone-700 font-medium group-hover:text-stone-900">{c.name}</span>
                      </div>
                      <Badge color={c.state==='approved'?'green':c.state==='needs_review'?'amber':'stone'}>{labels[c.state]||c.state}</Badge>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      ) : (
        <>
          {persona.role==='clinician' && <ClinicianApp db={db} onUpdateDb={setDb}/>}
          {persona.role==='client' && <ClientApp db={db} clientId={persona.id} onUpdateDb={setDb}/>}
        </>
      )}
      <div className="fixed bottom-5 left-5 z-50 flex flex-col items-start gap-2">
        {persona && (
          <button onClick={()=>setPersona(null)} className="flex items-center gap-2 px-4 py-2 bg-white border border-stone-200 rounded-full shadow-md text-xs font-bold text-stone-700 hover:bg-stone-50 transition">
            <Icon name="LayoutGrid" size={13}/> Switch role
          </button>
        )}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
